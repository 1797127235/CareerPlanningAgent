<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>职途智析 · 登录</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg:#fafafa;
  --surface-1:#ffffff;
  --surface-2:#f5f5f5;
  --surface-3:#ffffff;
  --border:rgba(0,0,0,0.08);
  --border-hover:rgba(0,0,0,0.12);
  --text-primary:#171717;
  --text-secondary:#525252;
  --text-tertiary:#a3a3a3;
  --accent:#2563eb;
  --accent-dim:rgba(37,99,235,0.08);
  --accent-glow:rgba(37,99,235,0.15);
  /* Soft shadows for light theme */
  --shadow-sm:0 1px 2px rgba(0,0,0,0.04), 0 1px 3px rgba(0,0,0,0.02);
  --shadow-md:0 4px 12px rgba(0,0,0,0.06), 0 2px 4px rgba(0,0,0,0.03);
  --shadow-lg:0 12px 32px rgba(0,0,0,0.08), 0 4px 12px rgba(0,0,0,0.04);
  --shadow-xl:0 24px 64px rgba(0,0,0,0.1), 0 8px 24px rgba(0,0,0,0.06), 0 0 0 1px rgba(0,0,0,0.04);
}

body{
  min-height:100vh;
  font-family:'Plus Jakarta Sans','Noto Sans SC',sans-serif;
  color:var(--text-primary);
  background:var(--bg);
  overflow:hidden;
}

/* ── Subtle ambient glow - lighter theme ── */
.ambient{
  position:fixed;inset:0;z-index:0;pointer-events:none;
}
.ambient::before{
  content:'';position:absolute;
  width:700px;height:700px;
  top:-250px;right:-150px;
  background:radial-gradient(circle,rgba(37,99,235,0.12) 0%,transparent 65%);
  animation:ambient-drift 20s ease-in-out infinite alternate;
}
.ambient::after{
  content:'';position:absolute;
  width:600px;height:600px;
  bottom:-200px;left:-150px;
  background:radial-gradient(circle,rgba(37,99,235,0.08) 0%,transparent 60%);
  animation:ambient-drift 24s ease-in-out infinite alternate-reverse;
}
@keyframes ambient-drift{
  0%{transform:translate(0,0) scale(1)}
  100%{transform:translate(50px,40px) scale(1.05)}
}

/* ── Scene container ── */
.scene{
  position:relative;z-index:1;
  min-height:100vh;
  display:flex;align-items:center;justify-content:center;
  padding:40px 20px;
  perspective:1200px;
}

/* ═══════════════════════════════════════════
   BACKGROUND DEPTH CARDS — light theme
   ═══════════════════════════════════════════ */

.depth-card{
  position:absolute;
  border-radius:20px;
  border:1px solid var(--border);
  overflow:hidden;
  pointer-events:none;
  transition:transform 0.5s cubic-bezier(0.23,1,0.32,1);
  background:var(--surface-1);
  box-shadow:var(--shadow-lg);
}

/* ── Depth Layer 1 (deepest / most blurred) ── */
.depth-card--1{
  width:420px;height:340px;
  top:8%;left:8%;
  transform:rotate(-4deg) translateZ(-120px);
  opacity:0.5;
  filter:blur(3px);
  z-index:1;
  animation:float-1 12s ease-in-out infinite;
}
.depth-card--1 .dc-inner{
  padding:28px;
}

/* ── Depth Layer 2 (mid depth) ── */
.depth-card--2{
  width:380px;height:300px;
  bottom:10%;right:6%;
  transform:rotate(3deg) translateZ(-80px);
  opacity:0.65;
  filter:blur(2px);
  z-index:2;
  animation:float-2 14s ease-in-out infinite;
}
.depth-card--2 .dc-inner{
  padding:24px;
}

/* ── Depth Layer 3 (closest background layer) ── */
.depth-card--3{
  width:350px;height:260px;
  top:14%;right:12%;
  transform:rotate(2.5deg) translateZ(-40px);
  opacity:0.8;
  filter:blur(1px);
  z-index:3;
  animation:float-3 10s ease-in-out infinite;
}
.depth-card--3 .dc-inner{
  padding:24px;
}

@keyframes float-1{
  0%,100%{transform:rotate(-4deg) translateZ(-120px) translateY(0)}
  50%{transform:rotate(-3.5deg) translateZ(-120px) translateY(-12px)}
}
@keyframes float-2{
  0%,100%{transform:rotate(3deg) translateZ(-80px) translateY(0)}
  50%{transform:rotate(3.5deg) translateZ(-80px) translateY(10px)}
}
@keyframes float-3{
  0%,100%{transform:rotate(2.5deg) translateZ(-40px) translateY(0)}
  50%{transform:rotate(2deg) translateZ(-40px) translateY(-8px)}
}

/* ── Fake UI inside depth cards - light theme ── */
.dc-header{
  display:flex;align-items:center;gap:8px;margin-bottom:18px;
}
.dc-dot{
  width:8px;height:8px;border-radius:50%;
}
.dc-dot--r{background:#fecaca}
.dc-dot--y{background:#fde68a}
.dc-dot--g{background:#bbf7d0}
.dc-title-bar{
  flex:1;height:10px;border-radius:4px;
  background:rgba(0,0,0,0.06);
  margin-left:8px;
}

.dc-line{
  height:8px;border-radius:4px;margin-bottom:10px;
  background:rgba(0,0,0,0.04);
}
.dc-line--short{width:60%}
.dc-line--med{width:80%}
.dc-line--long{width:95%}
.dc-line--accent{
  background:linear-gradient(90deg,var(--accent-dim),transparent);
  width:70%;
}

.dc-chart{
  display:flex;align-items:flex-end;gap:6px;
  height:80px;margin-top:16px;
}
.dc-bar{
  flex:1;border-radius:4px 4px 0 0;
  background:rgba(37,99,235,0.12);
}
.dc-bar:nth-child(1){height:40%}
.dc-bar:nth-child(2){height:65%}
.dc-bar:nth-child(3){height:50%}
.dc-bar:nth-child(4){height:80%;background:rgba(37,99,235,0.25)}
.dc-bar:nth-child(5){height:60%}
.dc-bar:nth-child(6){height:75%}
.dc-bar:nth-child(7){height:45%}

.dc-btn-row{
  display:flex;gap:8px;margin-top:14px;
}
.dc-btn{
  padding:6px 16px;border-radius:6px;
  font-size:10px;font-weight:600;
}
.dc-btn--filled{
  background:var(--accent-dim);
  color:var(--accent);
}
.dc-btn--outline{
  border:1px solid rgba(0,0,0,0.08);
  color:rgba(0,0,0,0.35);
}

.dc-stat-row{
  display:flex;gap:12px;margin-top:12px;
}
.dc-stat{
  flex:1;padding:10px;border-radius:8px;
  background:rgba(0,0,0,0.02);
  border:1px solid rgba(0,0,0,0.04);
}
.dc-stat-val{
  font-size:18px;font-weight:700;
  color:rgba(37,99,235,0.6);
  margin-bottom:2px;
}
.dc-stat-label{
  height:6px;width:50%;border-radius:3px;
  background:rgba(0,0,0,0.06);
}

.dc-nav{
  display:flex;gap:6px;margin-bottom:14px;
}
.dc-nav-item{
  padding:5px 12px;border-radius:5px;
  font-size:9px;font-weight:500;
  color:rgba(0,0,0,0.25);
  background:rgba(0,0,0,0.03);
}
.dc-nav-item--active{
  background:var(--accent-dim);
  color:var(--accent);
}

/* ═══════════════════════════════════════════
   MAIN LOGIN CARD — light theme
   ═══════════════════════════════════════════ */
.login-card{
  position:relative;z-index:10;
  width:100%;max-width:420px;
  background:var(--surface-1);
  border:1px solid var(--border);
  border-radius:24px;
  padding:48px 40px 40px;
  box-shadow:var(--shadow-xl), 0 0 60px rgba(37,99,235,0.08);
  animation:card-enter 0.7s cubic-bezier(0.23,1,0.32,1) both;
}
@keyframes card-enter{
  from{opacity:0;transform:translateY(30px) scale(0.97)}
  to{opacity:1;transform:translateY(0) scale(1)}
}

/* Subtle top-edge glow */
.login-card::before{
  content:'';position:absolute;
  top:-1px;left:15%;right:15%;height:1px;
  background:linear-gradient(90deg,transparent,var(--accent-glow),transparent);
  border-radius:1px;
}

/* ── Logo ── */
.logo{
  text-align:center;margin-bottom:36px;
  animation:fade-up 0.6s 0.1s ease both;
}
.logo-icon{
  display:inline-flex;align-items:center;justify-content:center;
  width:80px;height:80px;
  margin-bottom:20px;
  border-radius:20px;
  background:linear-gradient(135deg, #eff6ff 0%, #dbeafe 100%);
  border:1px solid #93c5fd;
  padding:12px;
  box-shadow:0 4px 16px rgba(37,99,235,0.1);
}
.logo-icon img{
  width:100%;
  height:100%;
  object-fit:contain;
}
.logo h1{
  font-size:26px;font-weight:700;
  letter-spacing:-0.02em;
  color:var(--text-primary);
}
.logo p{
  font-size:14px;
  color:var(--text-secondary);
  margin-top:6px;
  font-weight:400;
}

/* ── Tabs ── */
.tabs{
  display:flex;
  background:var(--surface-2);
  border-radius:12px;
  padding:4px;
  margin-bottom:32px;
  animation:fade-up 0.6s 0.15s ease both;
}
.tab{
  flex:1;padding:10px 0;
  text-align:center;
  font-size:14px;font-weight:600;
  color:var(--text-tertiary);
  border-radius:10px;
  cursor:pointer;
  transition:all 0.25s ease;
  border:none;background:none;
  font-family:inherit;
}
.tab:hover{color:var(--text-secondary)}
.tab--active{
  background:var(--surface-1);
  color:var(--text-primary);
  box-shadow:var(--shadow-sm), 0 1px 3px rgba(0,0,0,0.04);
}

/* ── Form ── */
.form-group{
  margin-bottom:20px;
  animation:fade-up 0.6s 0.2s ease both;
}
.form-group:nth-child(2){animation-delay:0.25s}
.form-label{
  display:block;
  font-size:13px;font-weight:500;
  color:var(--text-secondary);
  margin-bottom:8px;
  letter-spacing:0.01em;
}
.form-input{
  width:100%;
  padding:13px 16px;
  background:var(--surface-1);
  border:1.5px solid var(--border);
  border-radius:12px;
  font-size:15px;
  font-family:inherit;
  color:var(--text-primary);
  outline:none;
  transition:all 0.2s ease;
}
.form-input::placeholder{color:var(--text-tertiary)}
.form-input:hover{border-color:var(--border-hover)}
.form-input:focus{
  border-color:var(--accent);
  box-shadow:0 0 0 4px var(--accent-dim);
}

/* ── Options row ── */
.options-row{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:28px;
  animation:fade-up 0.6s 0.3s ease both;
}
.remember{
  display:flex;align-items:center;gap:10px;
  cursor:pointer;font-size:13px;color:var(--text-secondary);
}
.remember input[type="checkbox"]{
  -webkit-appearance:none;appearance:none;
  width:18px;height:18px;
  border:1.5px solid var(--border-hover);
  border-radius:5px;
  background:var(--surface-1);
  cursor:pointer;
  position:relative;
  transition:all 0.2s ease;
  flex-shrink:0;
}
.remember input[type="checkbox"]:hover{
  border-color:var(--accent);
}
.remember input[type="checkbox"]:checked{
  background:var(--accent);
  border-color:var(--accent);
}
.remember input[type="checkbox"]:checked::after{
  content:'';position:absolute;
  left:5px;top:1.5px;
  width:5px;height:10px;
  border:solid #fff;border-width:0 2px 2px 0;
  transform:rotate(45deg);
}
.forgot{
  font-size:13px;color:var(--accent);
  text-decoration:none;font-weight:500;
  transition:opacity 0.2s;
}
.forgot:hover{opacity:0.7}

/* ── Submit button ── */
.submit-btn{
  width:100%;
  padding:14px 0;
  background:linear-gradient(135deg,#2563eb,#1d4ed8);
  border:none;border-radius:12px;
  font-size:15px;font-weight:600;
  color:#fff;cursor:pointer;
  font-family:inherit;
  box-shadow:0 4px 16px rgba(37,99,235,0.3);
  transition:all 0.25s ease;
  animation:fade-up 0.6s 0.35s ease both;
}
.submit-btn:hover{
  transform:translateY(-2px);
  box-shadow:0 8px 28px rgba(37,99,235,0.4);
}
.submit-btn:active{
  transform:translateY(0);
}
.submit-btn:disabled{
  opacity:0.7;
  cursor:not-allowed;
  transform:none;
}

/* ── Switch link ── */
.switch-link{
  text-align:center;
  margin-top:28px;
  font-size:14px;
  color:var(--text-secondary);
  animation:fade-up 0.6s 0.4s ease both;
}
.switch-link a{
  color:var(--accent);
  text-decoration:none;
  font-weight:600;
  cursor:pointer;
  transition:opacity 0.2s;
}
.switch-link a:hover{opacity:0.7}

@keyframes fade-up{
  from{opacity:0;transform:translateY(12px)}
  to{opacity:1;transform:translateY(0)}
}

/* ── Error message ── */
.form-error{
  color:#dc2626;
  font-size:13px;
  text-align:center;
  margin-bottom:14px;
  padding:10px 16px;
  background:rgba(220,38,38,0.06);
  border-radius:8px;
  animation:fade-up 0.3s ease;
}

/* ── Responsive ── */
@media(max-width:768px){
  .depth-card--1{width:300px;height:240px;top:5%;left:-5%}
  .depth-card--2{width:280px;height:220px;bottom:5%;right:-3%}
  .depth-card--3{width:260px;height:200px;top:8%;right:0%}
  .login-card{padding:36px 28px 32px}
}
@media(max-width:480px){
  .depth-card{display:none}
  .login-card{max-width:100%;border-radius:20px;margin:0 16px}
}
</style>
</head>
<body>

<div class="ambient"></div>

<div class="scene">

  <!-- ═══ Depth Card 1 — deepest layer (fake dashboard) ═══ -->
  <div class="depth-card depth-card--1">
    <div class="dc-inner">
      <div class="dc-header">
        <div class="dc-dot dc-dot--r"></div>
        <div class="dc-dot dc-dot--y"></div>
        <div class="dc-dot dc-dot--g"></div>
        <div class="dc-title-bar"></div>
      </div>
      <div class="dc-nav">
        <span class="dc-nav-item dc-nav-item--active">概览</span>
        <span class="dc-nav-item">技能</span>
        <span class="dc-nav-item">路径</span>
        <span class="dc-nav-item">报告</span>
      </div>
      <div class="dc-line dc-line--long"></div>
      <div class="dc-line dc-line--med"></div>
      <div class="dc-line dc-line--short"></div>
      <div class="dc-chart">
        <div class="dc-bar"></div>
        <div class="dc-bar"></div>
        <div class="dc-bar"></div>
        <div class="dc-bar"></div>
        <div class="dc-bar"></div>
        <div class="dc-bar"></div>
        <div class="dc-bar"></div>
      </div>
    </div>
  </div>

  <!-- ═══ Depth Card 2 — mid layer (fake stats panel) ═══ -->
  <div class="depth-card depth-card--2">
    <div class="dc-inner">
      <div class="dc-header">
        <div class="dc-dot dc-dot--r"></div>
        <div class="dc-dot dc-dot--y"></div>
        <div class="dc-dot dc-dot--g"></div>
        <div class="dc-title-bar"></div>
      </div>
      <div class="dc-stat-row">
        <div class="dc-stat">
          <div class="dc-stat-val">87%</div>
          <div class="dc-stat-label"></div>
        </div>
        <div class="dc-stat">
          <div class="dc-stat-val">12</div>
          <div class="dc-stat-label"></div>
        </div>
        <div class="dc-stat">
          <div class="dc-stat-val">A+</div>
          <div class="dc-stat-label"></div>
        </div>
      </div>
      <div style="margin-top:16px">
        <div class="dc-line dc-line--long"></div>
        <div class="dc-line dc-line--accent"></div>
        <div class="dc-line dc-line--med"></div>
        <div class="dc-line dc-line--short"></div>
      </div>
      <div class="dc-btn-row">
        <span class="dc-btn dc-btn--filled">开始评估</span>
        <span class="dc-btn dc-btn--outline">查看详情</span>
      </div>
    </div>
  </div>

  <!-- ═══ Depth Card 3 — nearest background layer (fake profile) ═══ -->
  <div class="depth-card depth-card--3">
    <div class="dc-inner">
      <div class="dc-header">
        <div class="dc-dot dc-dot--r"></div>
        <div class="dc-dot dc-dot--y"></div>
        <div class="dc-dot dc-dot--g"></div>
        <div class="dc-title-bar"></div>
      </div>
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:14px">
        <div style="width:36px;height:36px;border-radius:50%;background:var(--accent-dim);flex-shrink:0"></div>
        <div style="flex:1">
          <div class="dc-line dc-line--med" style="margin-bottom:6px;height:10px"></div>
          <div class="dc-line dc-line--short" style="margin-bottom:0;height:6px"></div>
        </div>
      </div>
      <div class="dc-line dc-line--long"></div>
      <div class="dc-line dc-line--accent"></div>
      <div class="dc-line dc-line--med"></div>
      <div class="dc-line dc-line--long"></div>
      <div class="dc-line dc-line--short"></div>
      <div class="dc-btn-row">
        <span class="dc-btn dc-btn--filled">编辑资料</span>
        <span class="dc-btn dc-btn--outline">导出</span>
      </div>
    </div>
  </div>

  <!-- ═══ MAIN LOGIN CARD ═══ -->
  <div class="login-card" id="loginCard">
    <div class="logo">
      <div class="logo-icon">
        <img src="logo.png" alt="职途智析">
      </div>
      <h1>职途智析</h1>
      <p>AI 驱动的职业规划助手</p>
    </div>

    <div class="tabs" id="tabs">
      <button class="tab tab--active" data-tab="login">登录</button>
      <button class="tab" data-tab="register">注册</button>
    </div>

    <!-- Login Form -->
    <form id="loginForm" autocomplete="off">
      <div class="form-group">
        <label class="form-label" id="usernameLabel">用户名</label>
        <input class="form-input" type="text" id="usernameInput" placeholder="请输入用户名" autocomplete="off">
      </div>
      <div class="form-group">
        <label class="form-label">密码</label>
        <input class="form-input" type="password" placeholder="请输入密码" autocomplete="off">
      </div>
      <div class="options-row" id="optionsRow">
        <label class="remember">
          <input type="checkbox">
          <span>记住我</span>
        </label>
        <a href="#" class="forgot">忘记密码?</a>
      </div>
      <button type="submit" class="submit-btn" id="submitBtn">登录</button>
    </form>

    <div class="switch-link" id="switchLink">
      还没有账号？<a href="#" id="switchAction">立即注册</a>
    </div>
  </div>

</div>

<script>
(function(){
  const tabs = document.querySelectorAll('.tab');
  const optionsRow = document.getElementById('optionsRow');
  const submitBtn = document.getElementById('submitBtn');
  const switchLink = document.getElementById('switchLink');
  const switchAction = document.getElementById('switchAction');
  const usernameLabel = document.getElementById('usernameLabel');
  const usernameInput = document.getElementById('usernameInput');

  let currentTab = 'login';

  function switchTo(tab) {
    currentTab = tab;
    tabs.forEach(t => t.classList.toggle('tab--active', t.dataset.tab === tab));

    if (tab === 'register') {
      optionsRow.style.display = 'none';
      submitBtn.textContent = '注册';
      switchLink.innerHTML = '已有账号？<a href="#" id="switchAction">立即登录</a>';
    } else {
      optionsRow.style.display = 'flex';
      submitBtn.textContent = '登录';
      switchLink.innerHTML = '还没有账号？<a href="#" id="switchAction">立即注册</a>';
    }

    document.getElementById('switchAction').addEventListener('click', function(e) {
      e.preventDefault();
      switchTo(tab === 'login' ? 'register' : 'login');
    });
  }

  tabs.forEach(t => {
    t.addEventListener('click', () => switchTo(t.dataset.tab));
  });

  switchAction.addEventListener('click', function(e) {
    e.preventDefault();
    switchTo('register');
  });

  // ── Form submit → call backend API ──
  const form = document.getElementById('loginForm');
  const passwordInput = form.querySelector('input[type="password"]');

  form.addEventListener('submit', async function(e) {
    e.preventDefault();
    const username = usernameInput.value.trim();
    const password = passwordInput.value.trim();

    if (!username || !password) {
      showError('请输入用户名和密码');
      return;
    }

    submitBtn.disabled = true;
    submitBtn.textContent = currentTab === 'login' ? '登录中...' : '注册中...';

    try {
      const endpoint = currentTab === 'login' ? '/api/auth/login' : '/api/auth/register';
      const res = await fetch(endpoint, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password }),
      });

      const data = await res.json();

      if (!res.ok) {
        showError(data.detail || '操作失败');
        return;
      }

      if (data.success && data.data?.token) {
        localStorage.setItem('token', data.data.token);
        localStorage.setItem('user', JSON.stringify(data.data.user));
        window.location.href = '/';
      } else {
        showError(data.message || '操作失败');
      }
    } catch (err) {
      showError('网络错误，请检查后端是否启动');
    } finally {
      submitBtn.disabled = false;
      submitBtn.textContent = currentTab === 'login' ? '登录' : '注册';
    }
  });

  // Error display
  function showError(msg) {
    let errEl = document.getElementById('formError');
    if (!errEl) {
      errEl = document.createElement('div');
      errEl.id = 'formError';
      errEl.className = 'form-error';
      submitBtn.parentNode.insertBefore(errEl, submitBtn);
    }
    errEl.textContent = msg;
    setTimeout(() => { if (errEl.parentNode) errEl.remove(); }, 4000);
  }

  // ── Parallax depth on mouse move ──
  const scene = document.querySelector('.scene');
  const cards = document.querySelectorAll('.depth-card');
  const loginCard = document.querySelector('.login-card');

  document.addEventListener('mousemove', function(e) {
    const cx = (e.clientX / window.innerWidth - 0.5) * 2;
    const cy = (e.clientY / window.innerHeight - 0.5) * 2;

    // Background cards move MORE (parallax: deeper = more movement)
    cards.forEach((card, i) => {
      const depth = [18, 12, 7][i] || 10;
      const baseRotation = [[-4, 0], [3, 0], [2.5, 0]][i] || [0, 0];
      const rx = baseRotation[0] + cy * 1.5;
      const ry = cx * 2;
      card.style.transform =
        `rotate(${rx}deg) translateX(${cx * depth}px) translateY(${cy * depth}px)`;
    });

    // Main card moves LESS (foreground stability)
    loginCard.style.transform =
      `translateX(${cx * -2}px) translateY(${cy * -2}px)`;
  });
})();
</script>
</body>
</html>
