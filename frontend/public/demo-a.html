<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Demo A — 顶栏画像 + 内容分区</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  body { font-family: -apple-system, 'PingFang SC', sans-serif; background: #f1f5f9; }
  .sidebar { background: #fff; border-right: 1px solid #e2e8f0; }
  .nav-item { display: flex; align-items: center; gap: 10px; padding: 9px 14px; border-radius: 8px; font-size: 13.5px; color: #64748b; cursor: pointer; transition: all 0.15s; }
  .nav-item:hover { background: #f1f5f9; color: #1e293b; }
  .nav-item.active { background: #eff6ff; color: #2563eb; font-weight: 600; }
  .nav-icon { width: 16px; height: 16px; opacity: 0.7; }
  .card { background: #fff; border-radius: 12px; border: 1px solid #e2e8f0; }
  .metric-val { font-size: 26px; font-weight: 700; color: #0f172a; line-height: 1; }
  .metric-label { font-size: 11px; color: #94a3b8; margin-top: 4px; font-weight: 500; }
  .pill { font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 99px; }
  .progress-bar { height: 4px; background: #e2e8f0; border-radius: 99px; overflow: hidden; }
  .progress-fill { height: 100%; border-radius: 99px; background: #f59e0b; transition: width 0.7s; }
</style>
</head>
<body class="flex h-screen overflow-hidden">

<!-- Sidebar -->
<aside class="sidebar w-[200px] flex flex-col flex-shrink-0 h-full">
  <div class="h-14 flex items-center px-4 border-b border-slate-100">
    <div class="flex items-center gap-2">
      <div class="w-6 h-6 bg-blue-600 rounded-md flex items-center justify-center">
        <svg class="w-3.5 h-3.5 text-white" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24"><path d="M4 18L10.5 11.5L15 14L20 6"/></svg>
      </div>
      <span class="font-bold text-slate-800 text-[14px]">职途智析</span>
    </div>
  </div>
  <nav class="flex-1 px-3 py-3 space-y-0.5">
    <div class="nav-item active">
      <svg class="nav-icon" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/></svg>
      首页
    </div>
    <div class="nav-item">
      <svg class="nav-icon" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M4.22 4.22l2.12 2.12M17.66 17.66l2.12 2.12M2 12h3M19 12h3M4.22 19.78l2.12-2.12M17.66 6.34l2.12-2.12"/></svg>
      岗位图谱
    </div>
    <div class="nav-item">
      <svg class="nav-icon" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg>
      机会管理
    </div>
    <div class="nav-item">
      <svg class="nav-icon" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M12 2a10 10 0 100 20 10 10 0 000-20zM12 6v6l4 2"/></svg>
      面试练习
    </div>
    <div class="nav-item">
      <svg class="nav-icon" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
      成长看板
    </div>
    <div class="nav-item">
      <svg class="nav-icon" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
      发展报告
    </div>
  </nav>
  <div class="mx-3 mb-3 p-3 rounded-xl bg-slate-50 border border-slate-100 flex items-center gap-2.5">
    <div class="w-7 h-7 rounded-full bg-blue-100 flex items-center justify-center text-blue-600 font-bold text-[12px]">刘</div>
    <span class="text-[13px] font-medium text-slate-700 truncate">刘新宇</span>
  </div>
</aside>

<!-- Main -->
<main class="flex-1 overflow-y-auto">
  <!-- Profile top bar -->
  <div class="bg-white border-b border-slate-100 px-8 py-4 flex items-center gap-6">
    <div class="flex items-center gap-3 mr-2">
      <div class="w-9 h-9 rounded-xl bg-blue-50 border border-blue-100 flex items-center justify-center text-blue-600 font-bold text-[14px]">刘</div>
      <div>
        <p class="text-[14px] font-semibold text-slate-800">刘新宇C</p>
        <p class="text-[11px] text-slate-400">更新于 2026-04-06</p>
      </div>
    </div>
    <!-- divider -->
    <div class="w-px h-8 bg-slate-100"></div>
    <!-- metrics -->
    <div class="flex items-center gap-6">
      <div class="flex items-center gap-2">
        <span class="text-[13px] text-slate-500">竞争力</span>
        <span class="text-[18px] font-bold text-slate-800 tabular-nums">59</span>
      </div>
      <div class="flex items-center gap-2">
        <span class="text-[13px] text-slate-500">完整度</span>
        <span class="text-[18px] font-bold text-slate-800 tabular-nums">80%</span>
      </div>
      <div class="flex items-center gap-2">
        <span class="text-[13px] text-slate-500">技能</span>
        <span class="text-[18px] font-bold text-slate-800 tabular-nums">11</span>
        <span class="text-[12px] text-slate-400">项</span>
      </div>
      <div class="flex items-center gap-1.5">
        <svg class="w-3.5 h-3.5 text-slate-400" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>
        <span class="text-[13px] text-slate-600">C++后端工程师</span>
        <span class="pill bg-amber-50 text-amber-600">转型区</span>
      </div>
    </div>
    <div class="ml-auto flex gap-2">
      <button class="flex items-center gap-1.5 px-3.5 py-1.5 rounded-lg bg-blue-600 text-white text-[12px] font-semibold hover:bg-blue-700 cursor-pointer">
        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M17 8l-5-5-5 5M12 3v12"/></svg>
        上传简历
      </button>
      <button class="flex items-center gap-1.5 px-3.5 py-1.5 rounded-lg border border-slate-200 text-slate-600 text-[12px] font-semibold hover:bg-slate-50 cursor-pointer">
        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
        编辑画像
      </button>
    </div>
  </div>

  <!-- Content -->
  <div class="px-8 py-6 max-w-[900px]">

    <!-- guidance banner -->
    <div class="mb-5 flex items-center gap-3 px-4 py-3 rounded-xl bg-blue-50 border border-blue-100">
      <svg class="w-4 h-4 text-blue-500 shrink-0" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 8v4M12 16h.01"/></svg>
      <p class="text-[13px] text-blue-700 flex-1">上次匹配度 40%，你已投递 1 个岗位，同时可以练习面试提升率。</p>
      <button class="text-[13px] font-semibold text-blue-600 hover:underline flex items-center gap-1 cursor-pointer whitespace-nowrap">
        去面试练习
        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
      </button>
    </div>

    <!-- stats + activity row -->
    <div class="grid grid-cols-3 gap-4 mb-5">
      <div class="card p-4">
        <p class="metric-val">0</p>
        <p class="metric-label">诊断次数</p>
      </div>
      <div class="card p-4">
        <p class="metric-val">0</p>
        <p class="metric-label">面试练习</p>
      </div>
      <div class="card p-4">
        <p class="metric-val">0</p>
        <p class="metric-label">连续训练</p>
      </div>
    </div>

    <!-- nav links — list style -->
    <div class="card overflow-hidden">
      <div class="px-5 py-3 border-b border-slate-50">
        <span class="text-[11px] font-bold text-slate-400 uppercase tracking-wider">快速入口</span>
      </div>
      <div class="divide-y divide-slate-50">
        <a href="#" class="flex items-center justify-between px-5 py-3.5 hover:bg-slate-50 transition-colors group">
          <div class="flex items-center gap-3">
            <svg class="w-4 h-4 text-slate-400" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg>
            <span class="text-[14px] font-medium text-slate-700">机会管理</span>
            <span class="text-[12px] text-slate-400">追踪目标岗位进度</span>
          </div>
          <svg class="w-4 h-4 text-slate-300 group-hover:text-slate-500 group-hover:translate-x-0.5 transition-all" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
        </a>
        <a href="#" class="flex items-center justify-between px-5 py-3.5 hover:bg-slate-50 transition-colors group">
          <div class="flex items-center gap-3">
            <svg class="w-4 h-4 text-slate-400" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M12 2a10 10 0 100 20 10 10 0 000-20zM12 6v6l4 2"/></svg>
            <span class="text-[14px] font-medium text-slate-700">面试练习</span>
            <span class="text-[12px] text-slate-400">针对性练习薄弱项</span>
          </div>
          <svg class="w-4 h-4 text-slate-300 group-hover:text-slate-500 group-hover:translate-x-0.5 transition-all" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
        </a>
        <a href="#" class="flex items-center justify-between px-5 py-3.5 hover:bg-slate-50 transition-colors group">
          <div class="flex items-center gap-3">
            <svg class="w-4 h-4 text-slate-400" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M4.22 4.22l2.12 2.12M17.66 17.66l2.12 2.12M2 12h3M19 12h3M4.22 19.78l2.12-2.12M17.66 6.34l2.12-2.12"/></svg>
            <span class="text-[14px] font-medium text-slate-700">岗位图谱</span>
            <span class="text-[12px] text-slate-400">探索职业方向</span>
          </div>
          <svg class="w-4 h-4 text-slate-300 group-hover:text-slate-500 group-hover:translate-x-0.5 transition-all" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
        </a>
        <a href="#" class="flex items-center justify-between px-5 py-3.5 hover:bg-slate-50 transition-colors group">
          <div class="flex items-center gap-3">
            <svg class="w-4 h-4 text-slate-400" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
            <span class="text-[14px] font-medium text-slate-700">发展报告</span>
            <span class="text-[12px] text-slate-400">生成完整分析报告</span>
          </div>
          <svg class="w-4 h-4 text-slate-300 group-hover:text-slate-500 group-hover:translate-x-0.5 transition-all" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
        </a>
      </div>
    </div>
  </div>
</main>

</body>
</html>
