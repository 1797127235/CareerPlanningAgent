<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Demo C — 保留现有毛玻璃风格，重组信息层级</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  body {
    font-family: -apple-system, 'PingFang SC', sans-serif;
    background: linear-gradient(135deg, #dbeafe 0%, #f1f5f9 40%, #fef3c7 80%, #fce7f3 100%);
    min-height: 100vh;
  }
  .glass { background: rgba(255,255,255,0.65); backdrop-filter: blur(16px); border: 1px solid rgba(255,255,255,0.7); border-radius: 18px; }
  .glass-nav { background: rgba(255,255,255,0.75); backdrop-filter: blur(20px); border-right: 1px solid rgba(255,255,255,0.6); }
  .nav-item { display: flex; align-items: center; gap: 10px; padding: 9px 14px; border-radius: 10px; font-size: 13.5px; color: #64748b; cursor: pointer; transition: all 0.15s; }
  .nav-item:hover { background: rgba(255,255,255,0.5); color: #1e293b; }
  .nav-item.active { background: rgba(255,255,255,0.8); color: #1e293b; font-weight: 600; box-shadow: 0 2px 8px rgba(0,0,0,0.06); border: 1px solid rgba(255,255,255,0.7); }
  .metric-box { background: rgba(255,255,255,0.6); border-radius: 12px; padding: 10px 14px; text-align: center; }
  .divider { height: 1px; background: rgba(0,0,0,0.06); margin: 0; }
</style>
</head>
<body class="flex h-screen overflow-hidden">

<!-- Sidebar -->
<aside class="glass-nav w-[200px] flex flex-col flex-shrink-0 h-full">
  <div class="h-14 flex items-center justify-between px-4 border-b border-black/[0.05]">
    <div class="flex items-center gap-2">
      <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none"><defs><linearGradient id="g" x1="4" y1="20" x2="20" y2="4"><stop stop-color="#2563EB"/><stop offset="1" stop-color="#60a5fa"/></linearGradient></defs><path d="M4 18L10.5 11.5L15 14L20 6" stroke="url(#g)" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/><circle cx="20" cy="6" r="2.5" fill="#2563EB"/></svg>
      <span class="font-semibold text-slate-800 text-[14px]">职途智析</span>
    </div>
  </div>
  <nav class="flex-1 px-3 py-3 space-y-0.5 overflow-y-auto">
    <div class="nav-item active">
      <svg class="w-4 h-4 text-blue-500" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/></svg>首页
    </div>
    <div class="nav-item">
      <svg class="w-4 h-4 text-slate-400" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M4.22 4.22l2.12 2.12M17.66 17.66l2.12 2.12M2 12h3M19 12h3M4.22 19.78l2.12-2.12M17.66 6.34l2.12-2.12"/></svg>岗位图谱
    </div>
    <div class="nav-item">
      <svg class="w-4 h-4 text-slate-400" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg>机会管理
    </div>
    <div class="nav-item">
      <svg class="w-4 h-4 text-slate-400" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M12 1a3 3 0 00-3 3v8a3 3 0 006 0V4a3 3 0 00-3-3z"/><path d="M19 10v2a7 7 0 01-14 0v-2"/></svg>面试练习
    </div>
    <div class="nav-item">
      <svg class="w-4 h-4 text-slate-400" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>成长看板
    </div>
    <div class="nav-item">
      <svg class="w-4 h-4 text-slate-400" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>发展报告
    </div>
  </nav>
  <div class="mx-2 mb-3 px-3 py-2.5 rounded-xl bg-white/40 border border-white/40 flex items-center gap-2.5">
    <div class="w-7 h-7 rounded-full bg-blue-100 flex items-center justify-center text-blue-600 font-bold text-[12px] shrink-0">刘</div>
    <span class="text-[13px] font-medium text-slate-700 truncate">刘新宇</span>
  </div>
</aside>

<!-- Main -->
<main class="flex-1 overflow-y-auto px-8 py-6">
  <div class="max-w-[860px] mx-auto">

    <!-- Guidance banner -->
    <div class="mb-5 flex items-center gap-3 px-4 py-3 rounded-xl bg-white/50 border border-white/60 backdrop-blur-sm">
      <svg class="w-4 h-4 text-blue-500 shrink-0" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 8v4M12 16h.01"/></svg>
      <p class="text-[13px] text-slate-600 flex-1">上次匹配度 40%，你已投递 1 个岗位，同时可以练习面试提升率。</p>
      <button class="text-[13px] font-semibold text-blue-600 hover:underline flex items-center gap-1 cursor-pointer whitespace-nowrap">去面试练习 →</button>
    </div>

    <!-- Profile card — wide, horizontal layout -->
    <div class="glass px-6 py-5 mb-4">
      <div class="flex items-center gap-6">
        <!-- Avatar + name -->
        <div class="flex items-center gap-4 shrink-0">
          <div class="w-12 h-12 rounded-2xl bg-blue-50 border border-blue-100 flex items-center justify-center text-blue-600 font-bold text-[18px]">刘</div>
          <div>
            <p class="text-[16px] font-bold text-slate-900">刘新宇C</p>
            <div class="flex items-center gap-1.5 mt-0.5">
              <svg class="w-3 h-3 text-slate-400" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>
              <span class="text-[12px] text-slate-500">C++后端工程师</span>
              <span class="text-[10px] font-semibold px-1.5 py-0.5 rounded-full bg-amber-50 text-amber-600">转型区</span>
            </div>
          </div>
        </div>

        <div class="w-px h-10 bg-black/[0.07] shrink-0"></div>

        <!-- Metrics -->
        <div class="flex items-center gap-5 flex-1">
          <div class="metric-box">
            <p class="text-[22px] font-black text-amber-500 tabular-nums leading-none">59</p>
            <p class="text-[11px] text-slate-400 mt-1">竞争力</p>
          </div>
          <div class="metric-box">
            <p class="text-[22px] font-black text-emerald-500 tabular-nums leading-none">80<span class="text-[13px] font-medium">%</span></p>
            <p class="text-[11px] text-slate-400 mt-1">完整度</p>
          </div>
          <div class="metric-box">
            <p class="text-[22px] font-black text-blue-500 tabular-nums leading-none">11</p>
            <p class="text-[11px] text-slate-400 mt-1">技能项</p>
          </div>
          <!-- Progress bar -->
          <div class="flex-1 min-w-[80px]">
            <div class="h-1.5 bg-black/[0.06] rounded-full overflow-hidden">
              <div class="h-full rounded-full bg-amber-400" style="width:59%"></div>
            </div>
            <p class="text-[10px] text-slate-400 mt-1">竞争力进度</p>
          </div>
        </div>

        <div class="w-px h-10 bg-black/[0.07] shrink-0"></div>

        <!-- Actions -->
        <div class="flex gap-2 shrink-0">
          <button class="flex items-center gap-1.5 px-4 py-2 rounded-lg bg-[#2563eb] text-white text-[12px] font-semibold cursor-pointer hover:bg-blue-700 transition-colors">
            <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M17 8l-5-5-5 5M12 3v12"/></svg>
            上传简历
          </button>
          <button class="flex items-center gap-1.5 px-3.5 py-2 rounded-lg bg-white/60 border border-white/70 text-slate-600 text-[12px] font-semibold cursor-pointer hover:bg-white/80 transition-colors">
            <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
            编辑
          </button>
        </div>
      </div>
    </div>

    <!-- Stats + Activity row -->
    <div class="grid grid-cols-[1fr_1fr_1fr_1.5fr] gap-4 mb-4">
      <div class="glass p-4">
        <p class="text-[24px] font-black text-slate-800 tabular-nums leading-none">0</p>
        <p class="text-[11px] text-slate-400 mt-1.5 font-medium">诊断次数</p>
      </div>
      <div class="glass p-4">
        <p class="text-[24px] font-black text-slate-800 tabular-nums leading-none">0</p>
        <p class="text-[11px] text-slate-400 mt-1.5 font-medium">面试练习</p>
      </div>
      <div class="glass p-4">
        <p class="text-[24px] font-black text-slate-800 tabular-nums leading-none">0</p>
        <p class="text-[11px] text-slate-400 mt-1.5 font-medium">连续训练</p>
      </div>
      <div class="glass p-4 flex flex-col gap-2">
        <p class="text-[11px] font-medium text-slate-500">最近动态</p>
        <p class="text-[12px] text-slate-400 leading-relaxed">还没有活动记录，做完第一次 JD 诊断就会出现在这里</p>
        <a href="#" class="text-[12px] font-semibold text-blue-600 hover:underline flex items-center gap-1 mt-auto cursor-pointer">去机会管理 →</a>
      </div>
    </div>

    <!-- Quick links — compact list -->
    <div class="glass overflow-hidden">
      <div class="divide-y divide-black/[0.04]">
        <div class="px-5 py-2.5 bg-black/[0.015]">
          <span class="text-[11px] font-bold text-slate-400 uppercase tracking-wider">快速入口</span>
        </div>
        <a href="#" class="flex items-center justify-between px-5 py-3.5 hover:bg-white/40 transition-colors cursor-pointer group">
          <div class="flex items-center gap-3">
            <svg class="w-4 h-4 text-slate-400" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg>
            <span class="text-[14px] font-medium text-slate-700">机会管理</span>
            <span class="text-[12px] text-slate-400">追踪目标岗位进度</span>
          </div>
          <svg class="w-3.5 h-3.5 text-slate-300 group-hover:text-slate-500 group-hover:translate-x-0.5 transition-all" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
        </a>
        <a href="#" class="flex items-center justify-between px-5 py-3.5 hover:bg-white/40 transition-colors cursor-pointer group">
          <div class="flex items-center gap-3">
            <svg class="w-4 h-4 text-slate-400" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M12 1a3 3 0 00-3 3v8a3 3 0 006 0V4a3 3 0 00-3-3z"/><path d="M19 10v2a7 7 0 01-14 0v-2"/></svg>
            <span class="text-[14px] font-medium text-slate-700">面试练习</span>
            <span class="text-[12px] text-slate-400">针对性练习薄弱项</span>
          </div>
          <svg class="w-3.5 h-3.5 text-slate-300 group-hover:text-slate-500 group-hover:translate-x-0.5 transition-all" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
        </a>
        <a href="#" class="flex items-center justify-between px-5 py-3.5 hover:bg-white/40 transition-colors cursor-pointer group">
          <div class="flex items-center gap-3">
            <svg class="w-4 h-4 text-slate-400" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M4.22 4.22l2.12 2.12M17.66 17.66l2.12 2.12M2 12h3M19 12h3M4.22 19.78l2.12-2.12M17.66 6.34l2.12-2.12"/></svg>
            <span class="text-[14px] font-medium text-slate-700">岗位图谱</span>
            <span class="text-[12px] text-slate-400">探索职业方向</span>
          </div>
          <svg class="w-3.5 h-3.5 text-slate-300 group-hover:text-slate-500 group-hover:translate-x-0.5 transition-all" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
        </a>
        <a href="#" class="flex items-center justify-between px-5 py-3.5 hover:bg-white/40 transition-colors cursor-pointer group">
          <div class="flex items-center gap-3">
            <svg class="w-4 h-4 text-slate-400" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
            <span class="text-[14px] font-medium text-slate-700">发展报告</span>
            <span class="text-[12px] text-slate-400">生成完整分析报告</span>
          </div>
          <svg class="w-3.5 h-3.5 text-slate-300 group-hover:text-slate-500 group-hover:translate-x-0.5 transition-all" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
        </a>
      </div>
    </div>

  </div>
</main>

</body>
</html>
