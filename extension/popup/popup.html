<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="utf-8" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 260px;
      padding: 16px;
      font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
      font-size: 13px;
      color: #1e293b;
      background: #fff;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 16px;
    }
    .header span { font-size: 15px; font-weight: 700; }

    /* Status indicator */
    .status-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
      border-radius: 10px;
      background: #f8fafc;
      margin-bottom: 12px;
    }
    .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .dot.connected { background: #16a34a; box-shadow: 0 0 0 2px rgba(22,163,74,.2); }
    .dot.disconnected { background: #94a3b8; }
    .status-text { font-size: 12px; font-weight: 600; flex: 1; }
    .status-sub { font-size: 11px; color: #94a3b8; margin-top: 1px; }

    /* Action buttons */
    .btn {
      width: 100%;
      padding: 9px;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      margin-bottom: 8px;
    }
    .btn-primary { background: #2563eb; color: #fff; }
    .btn-primary:hover { background: #1d4ed8; }
    .btn-ghost {
      background: #f1f5f9;
      color: #475569;
    }
    .btn-ghost:hover { background: #e2e8f0; }
    .btn:disabled { opacity: 0.5; cursor: default; }

    /* Advanced / manual config */
    .advanced-toggle {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 11px;
      color: #94a3b8;
      cursor: pointer;
      margin-top: 4px;
      padding: 4px 0;
      user-select: none;
    }
    .advanced-toggle:hover { color: #64748b; }

    .advanced-body { display: none; margin-top: 10px; }
    .advanced-body.open { display: block; }

    label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      color: #64748b;
      margin-bottom: 3px;
    }
    input {
      width: 100%;
      border: 1px solid #e2e8f0;
      border-radius: 7px;
      padding: 7px 9px;
      font-size: 11px;
      margin-bottom: 8px;
      outline: none;
    }
    input:focus { border-color: #2563eb; }

    .save-status {
      font-size: 11px;
      color: #10b981;
      text-align: center;
      min-height: 14px;
      margin-top: 2px;
    }
  </style>
</head>
<body>
  <div class="header">
    <span>⚡ 职业规划助手</span>
  </div>

  <!-- Status card -->
  <div class="status-row" id="statusRow">
    <div class="dot disconnected" id="statusDot"></div>
    <div>
      <div class="status-text" id="statusText">未连接</div>
      <div class="status-sub" id="statusSub"></div>
    </div>
  </div>

  <!-- Primary action -->
  <button class="btn btn-primary" id="connectBtn">一键连接助手</button>
  <button class="btn btn-ghost" id="openBtn" style="display:none">打开助手</button>

  <!-- Advanced / manual config -->
  <div class="advanced-toggle" id="advancedToggle">
    <span>手动配置</span>
    <span id="advancedArrow">▾</span>
  </div>
  <div class="advanced-body" id="advancedBody">
    <label>助手地址</label>
    <input id="appUrl" placeholder="http://localhost:5173" />
    <label>扩展令牌</label>
    <input id="token" type="password" placeholder="粘贴令牌" />
    <button class="btn btn-ghost" id="saveBtn">保存</button>
    <div class="save-status" id="saveStatus"></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
