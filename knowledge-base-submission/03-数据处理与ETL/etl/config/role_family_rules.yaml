# role_family_rules.yaml — 岗位分类关键词配置
# version: 2025-01
# 修改说明: priority 越小越优先匹配，避免关键词重叠时误分类
# exclude_keywords: 命中任一排除词则跳过此 family

version: "2025-01"

families:

  AI/ML:
    priority: 1
