<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>方案B — 双栏对比视图</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#f8fafc;font-family:-apple-system,'PingFang SC','Microsoft YaHei',sans-serif;color:#1e293b;height:100vh;overflow:hidden;display:flex;flex-direction:column}
.header{background:#fff;border-bottom:1px solid #e2e8f0;padding:14px 24px;display:flex;align-items:center;gap:12px;flex-shrink:0}
.header h1{font-size:16px;font-weight:700;color:#334155}
.header .badge{font-size:11px;background:#f1f5f9;color:#64748b;padding:3px 10px;border-radius:6px}
.main{flex:1;display:flex;overflow:hidden}

/* ── Left Panel ── */
.left{width:280px;background:#fff;border-right:1px solid #e2e8f0;overflow-y:auto;flex-shrink:0}
.left-title{padding:14px 16px 8px;font-size:12px;font-weight:600;color:#94a3b8;text-transform:uppercase;letter-spacing:.5px}
.job-item{padding:12px 16px;cursor:pointer;border-left:3px solid transparent;transition:all .15s;display:flex;align-items:center;gap:10px}
.job-item:hover{background:#f8fafc}
.job-item.active{background:#f5f3ff;border-left-color:#7c3aed}
.job-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.job-item-info{flex:1;min-width:0}
.job-item-name{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.job-item-meta{font-size:11px;color:#94a3b8}

/* ── Right Panel ── */
.right{flex:1;overflow-y:auto;padding:24px 32px}
.right-empty{display:flex;align-items:center;justify-content:center;height:100%;color:#94a3b8;font-size:14px}

.section{margin-bottom:28px}
.section h3{font-size:14px;font-weight:700;color:#475569;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.section h3 .icon{font-size:16px}

/* Profile Header */
.profile-head{display:flex;gap:24px;align-items:flex-start;margin-bottom:24px}
.profile-info{flex:1}
.profile-info h2{font-size:22px;font-weight:800;margin-bottom:4px}
.profile-info .meta{font-size:13px;color:#64748b}
.zone-badge{display:inline-block;font-size:11px;padding:3px 10px;border-radius:6px;font-weight:600;margin-top:6px}
.zone-safe{background:#dcfce7;color:#16a34a}
.zone-transition{background:#fef3c7;color:#d97706}
.zone-danger{background:#fee2e2;color:#dc2626}

/* Radar */
.radar-section{display:flex;gap:24px;align-items:center}
.radar-section canvas{flex-shrink:0}
.ability-bars{flex:1;display:flex;flex-direction:column;gap:8px}
.ability-row{display:flex;align-items:center;gap:10px}
.ability-label{font-size:12px;color:#64748b;width:60px;text-align:right;flex-shrink:0}
.ability-track{flex:1;height:8px;background:#f1f5f9;border-radius:4px;overflow:hidden}
.ability-fill{height:100%;border-radius:4px;transition:width .6s ease}
.ability-val{font-size:12px;font-weight:600;color:#334155;width:32px}

/* Promo Ladder */
.ladder{display:flex;flex-direction:column;gap:0;max-width:450px}
.ladder-step{display:flex;align-items:center;gap:12px;padding:10px 14px;border-radius:10px}
.ladder-step.current{background:#f5f3ff;border:1px solid #c4b5fd}
.ladder-badge{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;flex-shrink:0}
.ladder-info{flex:1}
.ladder-title{font-size:14px;font-weight:600}
.ladder-desc{font-size:11px;color:#94a3b8}
.ladder-arrow{text-align:center;color:#cbd5e1;font-size:14px;margin:2px 0 2px 18px}

/* Transition Compare */
.compare-table{width:100%;border-collapse:separate;border-spacing:0;background:#fff;border:1px solid #e2e8f0;border-radius:10px;overflow:hidden}
.compare-table th{background:#f8fafc;text-align:left;padding:10px 14px;font-size:12px;font-weight:600;color:#64748b;border-bottom:1px solid #e2e8f0}
.compare-table td{padding:10px 14px;border-bottom:1px solid #f1f5f9;font-size:13px}
.compare-table tr:last-child td{border-bottom:none}
.compare-table tr:hover td{background:#faf5ff}
.overlap-badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600}
.overlap-high{background:#dcfce7;color:#16a34a}
.overlap-mid{background:#fef3c7;color:#d97706}
.overlap-low{background:#fee2e2;color:#dc2626}
.gap-tags{display:flex;flex-wrap:wrap;gap:3px}
.gap-tag{font-size:11px;background:#fef3c7;color:#92400e;padding:1px 6px;border-radius:3px}

/* Skills */
.skill-chips{display:flex;flex-wrap:wrap;gap:6px}
.skill-chip{font-size:12px;background:#f1f5f9;color:#475569;padding:4px 10px;border-radius:6px}
.cert-chip{font-size:12px;background:#ede9fe;color:#6d28d9;padding:4px 10px;border-radius:6px}
</style>
</head>
<body>

<div class="header">
  <h1>方案B — 双栏对比视图</h1>
  <span class="badge">左栏选岗位 · 右栏看画像+晋升+换岗</span>
</div>

<div class="main">
  <div class="left">
    <div class="left-title">岗位列表</div>

  </div>
  <div class="right" id="rightPanel">
    <div class="right-empty">← 选择一个岗位查看详情</div>
  </div>
</div>

title:"数据科学家",level:"P7",color:"#7c3aed",desc:"5-8年"}],transitions:[{target:"数据科学家",overlap:65,gaps:["ML","深度学习"]},{target:"BI工程师",overlap:70,gaps:["ETL","数仓"]},{target:"数据产品经理",overlap:60,gaps:["产品思维","原型"]},{target:"增长运营",overlap:55,gaps:["运营策略","增长"]},{target:"量化分析师",overlap:45,gaps:["金融","时序"]}]},{id:"test",name:"测试工程师",family:"测试/QA",zone:"danger",skills:["Selenium","Pytest","JMeter","SQL","接口测试"],certs:["ISTQB"],abilities:{专业技能:70,创新能力:50,学习能力:65,抗压能力:70,沟通能力:75,实习经验:70},promoPath:[{title:"初级测试",level:"P4",color:"#94a3b8",desc:"0-2年"},{title:"测试工程师",level:"P5",color:"#ef4444",desc:"2-4年",current:!0},{title:"自动化测试",level:"P6",color:"#f97316",desc:"3-5年"},{title:"测试架构师",level:"P7",color:"#7c3aed",desc:"5-8年"}],transitions:[{target:"自动化测试工程师",overlap:75,gaps:["编程","框架设计"]},{target:"DevOps工程师",overlap:45,gaps:["Docker","K8s"]},{target:"后端工程师",overlap:40,gaps:["系统设计","编程深度"]},{target:"产品经理",overlap:35,gaps:["需求分析","商业思维"]},{target:"项目经理",overlap:50,gaps:["PMP","风险管理"]}]},{id:"ux",name:"交互设计师",family:"设计",zone:"transition",skills:["Figma","用户研究","信息架构","原型设计","设计系统"],certs:[],abilities:{专业技能:75,创新能力:90,学习能力:75,抗压能力:60,沟通能力:85,实习经验:65},promoPath:[{title:"UI设计师",level:"P4",color:"#94a3b8",desc:"0-2年"},{title:"交互设计师",level:"P5",color:"#ec4899",desc:"2-4年",current:!0},{title:"高级UX",level:"P6",color:"#d946ef",desc:"4-6年"},{title:"设计总监",level:"P8",color:"#a855f7",desc:"8年+"}],transitions:[{target:"产品经理",overlap:60,gaps:["数据分析","商业思维"]},{target:"前端工程师",overlap:45,gaps:["JS","React"]},{target:"UX研究员",overlap:70,gaps:["定量分析","统计"]},{target:"品牌设计",overlap:55,gaps:["视觉传达","品牌策略"]},{target:"设计管理",overlap:50,gaps:["团队管理","预算"]}]},{id:"sec",name:"安全工程师",family:"安全",zone:"safe",skills:["渗透测试","代码审计","安全架构","应急响应","密码学"],certs:["CISP","OSCP"],abilities:{专业技能:85,创新能力:75,学习能力:85,抗压能力:80,沟通能力:55,实习经验:60},promoPath:[{title:"安全运维",level:"P4",color:"#94a3b8",desc:"0-2年"},{title:"安全工程师",level:"P5",color:"#10b981",desc:"2-4年",current:!0},{title:"高级安全",level:"P6",color:"#059669",desc:"4-7年"},{title:"安全架构师",level:"P7",color:"#7c3aed",desc:"7-10年"},{title:"CSO",level:"P9",color:"#a855f7",desc:"10年+"}],transitions:[{target:"云安全",overlap:70,gaps:["云原生","IAM"]},{target:"后端工程师",overlap:50,gaps:["系统设计","业务逻辑"]},{target:"DevOps",overlap:55,gaps:["CI/CD","容器"]},{target:"安全顾问",overlap:65,gaps:["合规","风险评估"]},{target:"漏洞研究员",overlap:60,gaps:["逆向","二进制"]}]},{id:"llm",name:"大模型工程师",family:"AI",zone:"safe",skills:["Python","PyTorch","LLM微调","RAG","Prompt Eng."],certs:[],abilities:{专业技能:90,创新能力:85,学习能力:90,抗压能力:70,沟通能力:60,实习经验:55},promoPath:[{title:"AI应用开发",level:"P4",color:"#94a3b8",desc:"0-1年"},{title:"大模型工程师",level:"P5",color:"#8b5cf6",desc:"1-3年",current:!0},{title:"高级LLM工程师",level:"P6",color:"#7c3aed",desc:"3-5年"},{title:"AI架构师",level:"P7",color:"#6d28d9",desc:"5-8年"}],transitions:[{target:"算法工程师",overlap:75,gaps:["传统ML","特征工程"]},{target:"后端工程师",overlap:50,gaps:["系统设计","数据库"]},{target:"AI产品经理",overlap:40,gaps:["需求","用户研究"]},{target:"技术布道师",overlap:45,gaps:["演讲","写作"]},{target:"AI创业",overlap:35,gaps:["融资","商业模型"]}]}];

const ZONE_MAP={safe:"安全区",transition:"过渡区",danger:"危险区"};
const ZONE_CLS={safe:"zone-safe",transition:"zone-transition",danger:"zone-danger"};
const ZONE_DOT={safe:"#22c55e",transition:"#f59e0b",danger:"#ef4444"};

// ── Left list ──
const jobList=document.getElementById("jobList"),rightPanel=document.getElementById("rightPanel");
let activeId=null;

JOBS.forEach(job=>{
  const el=document.createElement("div");
  el.className="job-item";
  el.dataset.id=job.id;
  el.innerHTML=`<div class="job-dot" style="background:${ZONE_DOT[job.zone]}"></div><div class="job-item-info"><div class="job-item-name">${job.name}</div><div class="job-item-meta">${job.family}</div></div>`;

function selectJob(job){
  activeId=job.id;
  document.querySelectorAll(".job-item").forEach(el=>el.classList.toggle("active",el.dataset.id===job.id));
  renderRight(job);
}

function renderRight(job){
  const abKeys=Object.keys(job.abilities),abVals=Object.values(job.abilities);
  const barsHTML=abKeys.map((k,i)=>{
    const v=abVals[i],color=v>=80?"#7c3aed":v>=60?"#a78bfa":"#c4b5fd";
    return`<div class="ability-row"><span class="ability-label">${k}</span><div class="ability-track"><div class="ability-fill" style="width:${v}%;background:${color}"></div></div><span class="ability-val">${v}</span></div>`;
  }).join("");

  const ladderHTML=job.promoPath.map((s,i)=>{
    const arrow=i<job.promoPath.length-1?'<div class="ladder-arrow">↓</div>':"";
    return`<div class="ladder-step ${s.current?"current":""}"><div class="ladder-badge" style="background:${s.color}">${s.level}</div><div class="ladder-info"><div class="ladder-title">${s.title}</div><div class="ladder-desc">${s.desc}</div></div></div>${arrow}`;
  }).join("");

  const tableHTML=job.transitions.map(t=>{
    const cls=t.overlap>=65?"overlap-high":t.overlap>=50?"overlap-mid":"overlap-low";
    return`<tr><td><strong>${t.target}</strong></td><td><span class="overlap-badge ${cls}">${t.overlap}%</span></td><td><div class="gap-tags">${t.gaps.map(g=>`<span class="gap-tag">${g}</span>`).join("")}</div></td></tr>`;
  }).join("");

    <div class="profile-head">
      <div class="profile-info">
        <h2>${job.name}</h2>
        <div class="meta">${job.family}${job.certs.length?" · "+job.certs.join("、"):""}</div>

    </div>

      <h3><span class="icon">📊</span>能力雷达</h3>
      <div class="radar-section">
        <canvas id="rr" width="220" height="220"></canvas>
        <div class="ability-bars">${barsHTML}</div>
      </div>
    </div>

    <div class="section">
      <h3><span class="icon">🛠</span>核心技能</h3>
      <div class="skill-chips">${job.skills.map(s=>`<span class="skill-chip">${s}</span>`).join("")}${job.certs.map(c=>`<span class="cert-chip">${c}</span>`).join("")}</div>

    </div>
  `;

  setTimeout(()=>drawRadar(document.getElementById("rr"),job.abilities,85),0);

function drawRadar(canvas,abilities,size){
  if(!canvas)return;
  const ctx=canvas.getContext("2d"),cx=canvas.width/2,cy=canvas.height/2;
  const labels=Object.keys(abilities),values=Object.values(abilities),n=labels.length,r=size;
  for(let ring=1;ring<=4;ring++){const rr=r*ring/4;ctx.beginPath();for(let i=0;i<=n;i++){const a=(i/n)*Math.PI*2-Math.PI/2;const x=cx+Math.cos(a)*rr,y=cy+Math.sin(a)*rr;i===0?ctx.moveTo(x,y):ctx.lineTo(x,y)}ctx.strokeStyle="#e2e8f0";ctx.lineWidth=.5;ctx.stroke()}
  for(let i=0;i<n;i++){const a=(i/n)*Math.PI*2-Math.PI/2;ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(cx+Math.cos(a)*r,cy+Math.sin(a)*r);ctx.strokeStyle="#e2e8f0";ctx.lineWidth=.5;ctx.stroke()}
  ctx.beginPath();for(let i=0;i<=n;i++){const idx=i%n;const a=(idx/n)*Math.PI*2-Math.PI/2;const v=values[idx]/100*r;const x=cx+Math.cos(a)*v,y=cy+Math.sin(a)*v;i===0?ctx.moveTo(x,y):ctx.lineTo(x,y)}ctx.fillStyle="rgba(124,58,237,0.12)";ctx.fill();ctx.strokeStyle="#7c3aed";ctx.lineWidth=1.5;ctx.stroke();
  for(let i=0;i<n;i++){const a=(i/n)*Math.PI*2-Math.PI/2;const v=values[i]/100*r;ctx.beginPath();ctx.arc(cx+Math.cos(a)*v,cy+Math.sin(a)*v,2.5,0,Math.PI*2);ctx.fillStyle="#7c3aed";ctx.fill();const lx=cx+Math.cos(a)*(r+16),ly=cy+Math.sin(a)*(r+16);ctx.font="11px sans-serif";ctx.textAlign="center";ctx.textBaseline="middle";ctx.fillStyle="#475569";ctx.fillText(labels[i],lx,ly)}
}
