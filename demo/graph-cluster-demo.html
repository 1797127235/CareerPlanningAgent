<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>岗位图谱 — 分簇布局 Demo</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #f8fafc; font-family: -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif; overflow: hidden; }
canvas { display: block; }
#controls {
  position: fixed; top: 16px; left: 50%; transform: translateX(-50%);
  display: flex; gap: 8px; z-index: 10;
}
#controls button {
  padding: 8px 18px; border: 1px solid #e2e8f0; border-radius: 8px;
  background: #fff; font-size: 13px; color: #475569; cursor: pointer;
  transition: all .15s;
}
#controls button:hover { border-color: #7c3aed; color: #7c3aed; }
#controls button.active { background: #7c3aed; color: #fff; border-color: #7c3aed; }
#info {
  position: fixed; bottom: 16px; left: 16px;
  background: rgba(255,255,255,.85); backdrop-filter: blur(8px);
  border: 1px solid #e2e8f0; border-radius: 8px; padding: 8px 14px;
  font-size: 12px; color: #64748b; z-index: 10;
}
#tooltip {
  position: fixed; pointer-events: none; z-index: 20;
  background: #fff; border: 1px solid #e2e8f0; border-radius: 8px;
  padding: 10px 14px; font-size: 13px; color: #334155;
  box-shadow: 0 4px 12px rgba(0,0,0,.08); display: none; max-width: 240px;
}
#legend {
  position: fixed; top: 16px; right: 16px; z-index: 10;
  background: rgba(255,255,255,.85); backdrop-filter: blur(8px);
  border: 1px solid #e2e8f0; border-radius: 8px; padding: 10px 14px;
  font-size: 12px; color: #475569;
}
.legend-row { display: flex; align-items: center; gap: 6px; margin: 3px 0; }
.legend-dot { width: 10px; height: 10px; border-radius: 50%; }
</style>
</head>
<body>
<div id="controls">
  <button class="active" data-layout="cluster">分簇布局</button>
  <button data-layout="radial">放射布局</button>
  <button data-layout="tree">层级布局</button>
</div>
<div id="legend">
  <div class="legend-row"><div class="legend-dot" style="background:#22c55e"></div> 安全区</div>
  <div class="legend-row"><div class="legend-dot" style="background:#f59e0b"></div> 过渡区</div>
  <div class="legend-row"><div class="legend-dot" style="background:#ef4444"></div> 危险区</div>
  <div style="margin-top:6px;color:#94a3b8;font-size:11px">滚轮缩放 · 拖拽平移 · 点击节点</div>
</div>
<div id="tooltip"></div>
<div id="info"></div>
<canvas id="c"></canvas>

<script>
// ─── Mock Data (resembling real career graph) ───
const FAMILIES = {
  '前端开发':   { color: '#3b82f6', cx: -300, cy: -100 },
  '后端开发':   { color: '#6366f1', cx: -100, cy: -200 },
  '数据/AI':    { color: '#8b5cf6', cx: 150,  cy: -180 },
  '移动开发':   { color: '#06b6d4', cx: -350, cy: 100 },
  '运维/DevOps':{ color: '#14b8a6', cx: 100,  cy: 100 },
  '产品':       { color: '#f97316', cx: 350,  cy: -50 },
  '设计':       { color: '#ec4899', cx: 350,  cy: 150 },
  '管理':       { color: '#a855f7', cx: 0,    cy: 250 },
  '测试/QA':    { color: '#64748b', cx: -200, cy: 200 },
};

const ZONE_COLORS = { safe: '#22c55e', transition: '#f59e0b', danger: '#ef4444' };

const NODES_RAW = [
  // 前端
  { id:'fe1', label:'前端工程师', family:'前端开发', zone:'safe', level:2 },
  { id:'fe2', label:'Vue工程师', family:'前端开发', zone:'safe', level:2 },
  { id:'fe3', label:'React工程师', family:'前端开发', zone:'safe', level:2 },
  { id:'fe4', label:'Angular工程师', family:'前端开发', zone:'transition', level:2 },
  { id:'fe5', label:'H5开发工程师', family:'前端开发', zone:'transition', level:1 },
  { id:'fe6', label:'小程序开发工程师', family:'前端开发', zone:'transition', level:2 },
  { id:'fe7', label:'全栈工程师', family:'前端开发', zone:'safe', level:3 },
  // 后端
  { id:'be1', label:'Java工程师', family:'后端开发', zone:'safe', level:2 },
  { id:'be2', label:'Go工程师', family:'后端开发', zone:'safe', level:2 },
  { id:'be3', label:'Python工程师', family:'后端开发', zone:'safe', level:2 },
  { id:'be4', label:'C++后端工程师', family:'后端开发', zone:'safe', level:2 },
  { id:'be5', label:'Node.js工程师', family:'后端开发', zone:'safe', level:2 },
  { id:'be6', label:'Rust工程师', family:'后端开发', zone:'safe', level:2 },
  { id:'be7', label:'架构师', family:'后端开发', zone:'safe', level:4 },
  // 数据/AI
  { id:'da1', label:'数据分析师', family:'数据/AI', zone:'transition', level:2 },
  { id:'da2', label:'数据科学家', family:'数据/AI', zone:'safe', level:3 },
  { id:'da3', label:'大模型工程师', family:'数据/AI', zone:'safe', level:3 },
  { id:'da4', label:'算法工程师', family:'数据/AI', zone:'safe', level:3 },
  { id:'da5', label:'深度学习工程师', family:'数据/AI', zone:'safe', level:3 },
  { id:'da6', label:'推荐算法工程师', family:'数据/AI', zone:'safe', level:3 },
  { id:'da7', label:'NLP工程师', family:'数据/AI', zone:'safe', level:3 },
  { id:'da8', label:'BI工程师', family:'数据/AI', zone:'transition', level:2 },
  // 移动
  { id:'mo1', label:'iOS开发工程师', family:'移动开发', zone:'transition', level:2 },
  { id:'mo2', label:'Android开发工程师', family:'移动开发', zone:'transition', level:2 },
  { id:'mo3', label:'Flutter工程师', family:'移动开发', zone:'safe', level:2 },
  { id:'mo4', label:'React Native工程师', family:'移动开发', zone:'transition', level:2 },
  // 运维
  { id:'op1', label:'运维工程师', family:'运维/DevOps', zone:'danger', level:2 },
  { id:'op2', label:'DevOps工程师', family:'运维/DevOps', zone:'safe', level:3 },
  { id:'op3', label:'SRE工程师', family:'运维/DevOps', zone:'safe', level:3 },
  { id:'op4', label:'云计算工程师', family:'运维/DevOps', zone:'safe', level:3 },
  { id:'op5', label:'DBA', family:'运维/DevOps', zone:'transition', level:2 },
  { id:'op6', label:'网络工程师', family:'运维/DevOps', zone:'danger', level:2 },
  // 产品
  { id:'pm1', label:'产品经理', family:'产品', zone:'transition', level:3 },
  { id:'pm2', label:'数据产品经理', family:'产品', zone:'safe', level:3 },
  { id:'pm3', label:'增长产品经理', family:'产品', zone:'transition', level:3 },
  { id:'pm4', label:'平台产品经理', family:'产品', zone:'safe', level:3 },
  { id:'pm5', label:'产品总监', family:'产品', zone:'safe', level:5 },
  // 设计
  { id:'ds1', label:'交互设计师', family:'设计', zone:'transition', level:2 },
  { id:'ds2', label:'UX研究员', family:'设计', zone:'transition', level:2 },
  { id:'ds3', label:'UI设计师', family:'设计', zone:'danger', level:2 },
  // 管理
  { id:'mg1', label:'CTO/VP', family:'管理', zone:'safe', level:5 },
  { id:'mg2', label:'研发总监', family:'管理', zone:'safe', level:5 },
  { id:'mg3', label:'技术经理', family:'管理', zone:'safe', level:4 },
  { id:'mg4', label:'项目经理', family:'管理', zone:'transition', level:3 },
  // 测试
  { id:'qa1', label:'QA工程师', family:'测试/QA', zone:'danger', level:2 },
  { id:'qa2', label:'自动化测试工程师', family:'测试/QA', zone:'transition', level:2 },
  { id:'qa3', label:'性能测试工程师', family:'测试/QA', zone:'safe', level:3 },
];

const EDGES_RAW = [
  // 前端内部
  ['fe1','fe2'],['fe1','fe3'],['fe1','fe4'],['fe1','fe5'],['fe1','fe6'],['fe7','fe1'],['fe7','be5'],
  // 后端内部
  ['be1','be2'],['be1','be3'],['be2','be4'],['be5','be3'],['be6','be4'],['be7','be1'],['be7','be2'],
  // 数据内部
  ['da1','da2'],['da2','da3'],['da4','da5'],['da4','da6'],['da4','da7'],['da1','da8'],['da3','da5'],
  // 跨簇
  ['fe7','be1'],['fe7','be3'],['be3','da4'],['be3','da1'],['be1','be7'],
  ['be7','mg3'],['mg3','mg2'],['mg2','mg1'],['mg4','mg3'],['pm1','mg4'],
  ['fe1','ds1'],['ds1','ds2'],['ds1','pm1'],['pm1','pm2'],['pm1','pm3'],['pm1','pm4'],['pm5','pm1'],
  ['mo1','fe1'],['mo2','fe1'],['mo3','mo1'],['mo3','mo2'],['mo4','mo3'],
  ['op1','op2'],['op2','op3'],['op2','op4'],['op1','op5'],['op5','op6'],
  ['qa1','qa2'],['qa2','qa3'],['qa1','op1'],['qa2','be3'],
  ['da3','be3'],['da8','pm2'],['op4','be2'],
  ['fe7','mg3'],['da2','pm2'],['be7','mg1'],
];

// ─── Engine ───
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const tooltip = document.getElementById('tooltip');
const info = document.getElementById('info');

let W, H, dpr;
function resize() {
  dpr = window.devicePixelRatio || 1;
  W = window.innerWidth; H = window.innerHeight;
  canvas.width = W * dpr; canvas.height = H * dpr;
  canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}
resize();
window.addEventListener('resize', resize);

// State
let nodes = NODES_RAW.map(n => ({ ...n, x: 0, y: 0, vx: 0, vy: 0 }));
let edges = EDGES_RAW.map(([s,t]) => ({ source: s, target: t }));
let cam = { x: 0, y: 0, zoom: 1 };
let selectedId = null;
let hoveredId = null;
let currentLayout = 'cluster';
let animProgress = 0;
let targetPositions = {};

info.textContent = `${nodes.length} 岗位 · ${edges.length} 关联`;

// ─── Layouts ───
function clusterLayout() {
  const pos = {};
  const familyCounts = {};
  nodes.forEach(n => { familyCounts[n.family] = (familyCounts[n.family] || 0) + 1; });
  const familyIdx = {};
  nodes.forEach(n => {
    if (!(n.family in familyIdx)) familyIdx[n.family] = 0;
    const f = FAMILIES[n.family];
    const count = familyCounts[n.family];
    const idx = familyIdx[n.family]++;
    const angle = (idx / count) * Math.PI * 2;
    const spread = 30 + count * 12;
    pos[n.id] = {
      x: f.cx + Math.cos(angle) * spread + (Math.random() - .5) * 20,
      y: f.cy + Math.sin(angle) * spread + (Math.random() - .5) * 20,
    };
  });
  return pos;
}

function radialLayout() {
  const center = selectedId || 'fe1';
  const pos = {};
  // BFS from center
  const visited = new Set([center]);
  const queue = [center];
  const levels = { [center]: 0 };
  const adj = {};
  nodes.forEach(n => adj[n.id] = []);
  edges.forEach(e => { adj[e.source]?.push(e.target); adj[e.target]?.push(e.source); });
  while (queue.length) {
    const curr = queue.shift();
    for (const nb of (adj[curr] || [])) {
      if (!visited.has(nb)) {
        visited.add(nb);
        levels[nb] = levels[curr] + 1;
        queue.push(nb);
      }
    }
  }
  // Unconnected nodes
  nodes.forEach(n => { if (!(n.id in levels)) levels[n.id] = 99; });

  const byLevel = {};
  nodes.forEach(n => {
    const lv = levels[n.id];
    if (!byLevel[lv]) byLevel[lv] = [];
    byLevel[lv].push(n);
  });

  for (const [lv, group] of Object.entries(byLevel)) {
    const r = lv == 0 ? 0 : lv == 99 ? 450 : parseInt(lv) * 120;
    group.forEach((n, i) => {
      const angle = (i / group.length) * Math.PI * 2 - Math.PI / 2;
      pos[n.id] = { x: Math.cos(angle) * r, y: Math.sin(angle) * r };
    });
  }
  return pos;
}

function treeLayout() {
  const pos = {};
  const familyOrder = Object.keys(FAMILIES);
  const byFamily = {};
  nodes.forEach(n => { if (!byFamily[n.family]) byFamily[n.family] = []; byFamily[n.family].push(n); });

  const colWidth = 120;
  const totalW = familyOrder.length * colWidth;
  const startX = -totalW / 2;

  familyOrder.forEach((fam, fi) => {
    const group = (byFamily[fam] || []).sort((a,b) => a.level - b.level);
    const cx = startX + fi * colWidth + colWidth / 2;
    group.forEach((n, i) => {
      const y = 200 - n.level * 80 + (Math.random() - .5) * 15;
      pos[n.id] = { x: cx + (Math.random() - .5) * 30, y };
    });
  });
  return pos;
}

function applyLayout(name) {
  currentLayout = name;
  let pos;
  if (name === 'cluster') pos = clusterLayout();
  else if (name === 'radial') pos = radialLayout();
  else pos = treeLayout();
  targetPositions = pos;
  animProgress = 0;
}

// Init
applyLayout('cluster');
nodes.forEach(n => { n.x = targetPositions[n.id]?.x || 0; n.y = targetPositions[n.id]?.y || 0; });

// ─── Interaction ───
let drag = null;
let panStart = null;

function screenToWorld(sx, sy) {
  return { x: (sx - W/2) / cam.zoom + cam.x, y: (sy - H/2) / cam.zoom + cam.y };
}
function worldToScreen(wx, wy) {
  return { x: (wx - cam.x) * cam.zoom + W/2, y: (wy - cam.y) * cam.zoom + H/2 };
}

function findNode(sx, sy) {
  const w = screenToWorld(sx, sy);
  let best = null, bestD = 14 / cam.zoom;
  for (const n of nodes) {
    const d = Math.hypot(n.x - w.x, n.y - w.y);
    if (d < bestD) { bestD = d; best = n; }
  }
  return best;
}

canvas.addEventListener('wheel', e => {
  e.preventDefault();
  const factor = e.deltaY > 0 ? 0.9 : 1.1;
  cam.zoom = Math.max(0.2, Math.min(5, cam.zoom * factor));
}, { passive: false });

canvas.addEventListener('mousedown', e => {
  const n = findNode(e.clientX, e.clientY);
  if (n) {
    drag = n;
  } else {
    panStart = { mx: e.clientX, my: e.clientY, cx: cam.x, cy: cam.y };
  }
});

canvas.addEventListener('mousemove', e => {
  if (drag) {
    const w = screenToWorld(e.clientX, e.clientY);
    drag.x = w.x; drag.y = w.y;
    targetPositions[drag.id] = { x: w.x, y: w.y };
  } else if (panStart) {
    cam.x = panStart.cx - (e.clientX - panStart.mx) / cam.zoom;
    cam.y = panStart.cy - (e.clientY - panStart.my) / cam.zoom;
  } else {
    const n = findNode(e.clientX, e.clientY);
    hoveredId = n ? n.id : null;
    canvas.style.cursor = n ? 'pointer' : 'grab';
    if (n) {
      tooltip.style.display = 'block';
      tooltip.style.left = (e.clientX + 12) + 'px';
      tooltip.style.top = (e.clientY - 10) + 'px';
      tooltip.innerHTML = `<strong>${n.label}</strong><br><span style="color:${ZONE_COLORS[n.zone]}">●</span> ${n.zone === 'safe' ? '安全区' : n.zone === 'transition' ? '过渡区' : '危险区'}<br>领域: ${n.family}`;
    } else {
      tooltip.style.display = 'none';
    }
  }
});

canvas.addEventListener('mouseup', e => {
  if (drag) { drag = null; return; }
  if (panStart) {
    const moved = Math.hypot(e.clientX - panStart.mx, e.clientY - panStart.my);
    panStart = null;
    if (moved < 3) {
      const n = findNode(e.clientX, e.clientY);
      if (n) {
        selectedId = n.id;
        if (currentLayout === 'radial') applyLayout('radial');
      } else {
        selectedId = null;
      }
    }
  }
});

// Controls
document.querySelectorAll('#controls button').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelector('#controls .active')?.classList.remove('active');
    btn.classList.add('active');
    applyLayout(btn.dataset.layout);
  });
});

// ─── Render ───
const adjMap = {};
nodes.forEach(n => adjMap[n.id] = new Set());
edges.forEach(e => { adjMap[e.source]?.add(e.target); adjMap[e.target]?.add(e.source); });

function draw() {
  requestAnimationFrame(draw);

  // Animate positions
  if (animProgress < 1) {
    animProgress = Math.min(1, animProgress + 0.03);
    const t = easeOutCubic(animProgress);
    nodes.forEach(n => {
      const tp = targetPositions[n.id];
      if (tp && !drag || drag?.id !== n.id) {
        n.x += (tp.x - n.x) * 0.08;
        n.y += (tp.y - n.y) * 0.08;
      }
    });
  }

  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = '#f8fafc';
  ctx.fillRect(0, 0, W, H);

  ctx.save();
  ctx.translate(W/2, H/2);
  ctx.scale(cam.zoom, cam.zoom);
  ctx.translate(-cam.x, -cam.y);

  const zoom = cam.zoom;

  // ── Cluster backgrounds (only in cluster layout) ──
  if (currentLayout === 'cluster' && zoom < 1.8) {
    for (const [fam, config] of Object.entries(FAMILIES)) {
      const members = nodes.filter(n => n.family === fam);
      if (!members.length) continue;
      let cx = 0, cy = 0;
      members.forEach(n => { cx += n.x; cy += n.y; });
      cx /= members.length; cy /= members.length;
      let maxR = 0;
      members.forEach(n => { maxR = Math.max(maxR, Math.hypot(n.x - cx, n.y - cy)); });
      const r = maxR + 40;

      ctx.beginPath();
      ctx.arc(cx, cy, r, 0, Math.PI * 2);
      ctx.fillStyle = config.color + '0a';
      ctx.fill();
      ctx.strokeStyle = config.color + '20';
      ctx.lineWidth = 1;
      ctx.setLineDash([4, 4]);
      ctx.stroke();
      ctx.setLineDash([]);

      // Cluster label
      ctx.font = `600 ${Math.max(14, 16 / zoom)}px sans-serif`;
      ctx.textAlign = 'center';
      ctx.fillStyle = config.color + '90';
      ctx.fillText(fam, cx, cy - r - 8);
    }
  }

  // ── Radial rings (only in radial layout) ──
  if (currentLayout === 'radial') {
    for (let i = 1; i <= 4; i++) {
      ctx.beginPath();
      ctx.arc(0, 0, i * 120, 0, Math.PI * 2);
      ctx.strokeStyle = '#e2e8f020';
      ctx.lineWidth = 1;
      ctx.stroke();
      ctx.font = '11px sans-serif';
      ctx.fillStyle = '#94a3b8';
      ctx.textAlign = 'left';
      ctx.fillText(`${i}跳`, i * 120 + 4, -4);
    }
  }

  // ── Tree axes ──
  if (currentLayout === 'tree') {
    ctx.font = '11px sans-serif';
    ctx.fillStyle = '#94a3b8';
    ctx.textAlign = 'center';
    for (let lv = 1; lv <= 5; lv++) {
      const y = 200 - lv * 80;
      ctx.beginPath();
      ctx.moveTo(-600, y);
      ctx.lineTo(600, y);
      ctx.strokeStyle = '#e2e8f040';
      ctx.lineWidth = 0.5;
      ctx.stroke();
      ctx.fillText(`L${lv}`, -580, y - 4);
    }
  }

  // ── Edges ──
  for (const e of edges) {
    const sn = nodes.find(n => n.id === e.source);
    const tn = nodes.find(n => n.id === e.target);
    if (!sn || !tn) continue;

    const isConnected = selectedId && (e.source === selectedId || e.target === selectedId);
    const isHoverConn = hoveredId && (e.source === hoveredId || e.target === hoveredId);

    ctx.beginPath();
    ctx.moveTo(sn.x, sn.y);
    ctx.lineTo(tn.x, tn.y);

    if (isConnected) {
      ctx.strokeStyle = 'rgba(124,58,237,0.6)';
      ctx.lineWidth = 2.5;
    } else if (isHoverConn) {
      ctx.strokeStyle = 'rgba(124,58,237,0.3)';
      ctx.lineWidth = 1.5;
    } else {
      ctx.strokeStyle = selectedId ? 'rgba(148,163,184,0.08)' : 'rgba(148,163,184,0.2)';
      ctx.lineWidth = 0.8;
    }
    ctx.stroke();
  }

  // ── Nodes ──
  for (const n of nodes) {
    const isSel = n.id === selectedId;
    const isHov = n.id === hoveredId;
    const isNeighbor = selectedId && adjMap[selectedId]?.has(n.id);
    const dimmed = selectedId && !isSel && !isNeighbor;

    const baseR = 5 + n.level * 1.5;
    const r = isSel ? baseR * 1.6 : (isHov || isNeighbor) ? baseR * 1.3 : baseR;
    const zoneColor = ZONE_COLORS[n.zone];
    const famColor = FAMILIES[n.family]?.color || '#64748b';

    // Glow
    if (isSel || isHov) {
      ctx.beginPath();
      ctx.arc(n.x, n.y, r + 6, 0, Math.PI * 2);
      ctx.fillStyle = isSel ? 'rgba(124,58,237,0.2)' : 'rgba(124,58,237,0.1)';
      ctx.fill();
    }

    // Circle — use zone color
    ctx.beginPath();
    ctx.arc(n.x, n.y, r, 0, Math.PI * 2);
    ctx.fillStyle = dimmed ? zoneColor + '40' : isSel ? '#7c3aed' : zoneColor;
    ctx.fill();

    // Family-colored ring
    if (!dimmed) {
      ctx.strokeStyle = '#fff';
      ctx.lineWidth = 1.5;
      ctx.stroke();
    }

    // Label — semantic zoom: only show when zoomed enough or hovered/selected
    const showLabel = zoom > 0.8 || isSel || isHov || isNeighbor;
    if (showLabel && !dimmed) {
      const fontSize = Math.min(12, Math.max(9, 11 / zoom));
      ctx.font = `500 ${fontSize}px sans-serif`;
      ctx.textAlign = 'center';
      const tw = ctx.measureText(n.label).width;
      const ly = n.y + r + 3;

      ctx.fillStyle = 'rgba(255,255,255,0.88)';
      roundRect(ctx, n.x - tw/2 - 3, ly - 1, tw + 6, fontSize + 2, 3);
      ctx.fill();

      ctx.fillStyle = isSel ? '#7c3aed' : '#334155';
      ctx.fillText(n.label, n.x, ly + fontSize - 1);
    }
  }

  ctx.restore();
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
}

function easeOutCubic(t) { return 1 - Math.pow(1 - t, 3); }

draw();
</script>
