*{margin:0;padding:0;box-sizing:border-box}
body{background:#f8fafc;font-family:-apple-system,'PingFang SC','Microsoft YaHei',sans-serif;color:#1e293b}
.header{background:#fff;border-bottom:1px solid #e2e8f0;padding:14px 24px;display:flex;align-items:center;gap:12px}
.header h1{font-size:16px;font-weight:700;color:#334155}
.header .badge{font-size:11px;background:#f1f5f9;color:#64748b;padding:3px 10px;border-radius:6px}
.container{max-width:1200px;margin:0 auto;padding:24px}

/* ── Grid ── */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;margin-bottom:24px}
.card{background:#fff;border:1px solid #e2e8f0;border-radius:12px;padding:20px;cursor:pointer;transition:all .2s}
.card:hover{border-color:#a78bfa;box-shadow:0 4px 16px rgba(124,58,237,.08)}
.card.active{border-color:#7c3aed;box-shadow:0 4px 20px rgba(124,58,237,.15)}
.card-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px}
.card-title{font-size:15px;font-weight:700}
.zone{font-size:11px;padding:2px 8px;border-radius:6px;font-weight:600}
.zone-safe{background:#dcfce7;color:#16a34a}
.zone-transition{background:#fef3c7;color:#d97706}
.zone-danger{background:#fee2e2;color:#dc2626}
.card-family{font-size:12px;color:#64748b;margin-bottom:10px}
.skill-tags{display:flex;flex-wrap:wrap;gap:4px}
.skill-tag{font-size:11px;background:#f1f5f9;color:#475569;padding:2px 8px;border-radius:4px}
.card canvas{display:block;margin:12px auto 0}

/* ── Detail Panel ── */
.detail-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:50}
.detail-overlay.open{display:flex;justify-content:center;align-items:flex-start;padding:40px 20px;overflow-y:auto}
.detail{background:#fff;border-radius:16px;max-width:800px;width:100%;padding:28px;box-shadow:0 20px 60px rgba(0,0,0,.12)}
.detail-close{float:right;background:none;border:none;font-size:20px;cursor:pointer;color:#94a3b8;padding:4px 8px;border-radius:6px}
.detail-close:hover{background:#f1f5f9;color:#475569}
.detail h2{font-size:20px;font-weight:800;margin-bottom:4px}
.detail .meta{font-size:13px;color:#64748b;margin-bottom:20px}

.detail-section{margin-bottom:24px}
.detail-section h3{font-size:14px;font-weight:700;color:#475569;margin-bottom:12px;padding-bottom:6px;border-bottom:1px solid #f1f5f9}

/* Radar */
.radar-wrap{display:flex;justify-content:center;margin-bottom:20px}

/* Promotion Path */
.promo-path{display:flex;flex-direction:column;gap:0;align-items:center}
.promo-step{display:flex;align-items:center;gap:12px;padding:10px 16px;border-radius:10px;width:100%;max-width:400px;transition:background .15s}
.promo-step.current{background:#f5f3ff;border:1px solid #c4b5fd}
.promo-step .level-badge{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;flex-shrink:0}
.promo-step .step-info{flex:1}
.promo-step .step-title{font-size:14px;font-weight:600}
.promo-step .step-desc{font-size:11px;color:#94a3b8}
.promo-arrow{color:#cbd5e1;font-size:18px;margin:2px 0}

/* Transition Cards */
.transition-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px}
.trans-card{background:#f8fafc;border:1px solid #e2e8f0;border-radius:10px;padding:14px;cursor:pointer;transition:all .15s}
.trans-card:hover{border-color:#a78bfa;background:#faf5ff}
.trans-card .trans-name{font-size:14px;font-weight:600;margin-bottom:6px}
.trans-card .overlap-bar{height:6px;background:#e2e8f0;border-radius:3px;overflow:hidden;margin:8px 0 4px}
.trans-card .overlap-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,#7c3aed,#a78bfa)}
.trans-card .overlap-text{font-size:11px;color:#64748b}
.trans-card .gap-skills{font-size:11px;color:#94a3b8;margin-top:6px}

/* Requirements List */
.req-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.req-item{display:flex;align-items:center;gap:8px;font-size:13px;padding:6px 10px;background:#f8fafc;border-radius:6px}
.req-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
</style>
</head>

// ── Radar Chart ──
function drawRadar(canvas, abilities, size, mini=false) {
  const ctx = canvas.getContext('2d')
  const cx = canvas.width/2, cy = canvas.height/2
  const labels = Object.keys(abilities)
  const values = Object.values(abilities)
  const n = labels.length
  const r = size

  // Background rings
  for (let ring = 1; ring <= 4; ring++) {
    const rr = r * ring / 4
    ctx.beginPath()
    for (let i = 0; i <= n; i++) {
      const angle = (i / n) * Math.PI * 2 - Math.PI / 2
      const x = cx + Math.cos(angle) * rr
      const y = cy + Math.sin(angle) * rr
      i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y)
    }
    ctx.strokeStyle = '#e2e8f0'
    ctx.lineWidth = 0.5
    ctx.stroke()
  }

  // Axes
  for (let i = 0; i < n; i++) {
    const angle = (i / n) * Math.PI * 2 - Math.PI / 2
    ctx.beginPath()
    ctx.moveTo(cx, cy)
    ctx.lineTo(cx + Math.cos(angle) * r, cy + Math.sin(angle) * r)
    ctx.strokeStyle = '#e2e8f0'
    ctx.lineWidth = 0.5
    ctx.stroke()
  }

  // Data polygon
  ctx.beginPath()
  for (let i = 0; i <= n; i++) {
    const idx = i % n
    const angle = (idx / n) * Math.PI * 2 - Math.PI / 2
    const v = values[idx] / 100 * r
    const x = cx + Math.cos(angle) * v
    const y = cy + Math.sin(angle) * v
    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y)
  }
  ctx.fillStyle = 'rgba(124,58,237,0.12)'
  ctx.fill()
  ctx.strokeStyle = '#7c3aed'
  ctx.lineWidth = 1.5
  ctx.stroke()

  // Dots + Labels
  for (let i = 0; i < n; i++) {
    const angle = (i / n) * Math.PI * 2 - Math.PI / 2
    const v = values[i] / 100 * r
    const x = cx + Math.cos(angle) * v
    const y = cy + Math.sin(angle) * v
    ctx.beginPath()
    ctx.arc(x, y, 2.5, 0, Math.PI * 2)
    ctx.fillStyle = '#7c3aed'
    ctx.fill()

    if (!mini) {
      const lx = cx + Math.cos(angle) * (r + 18)
      const ly = cy + Math.sin(angle) * (r + 18)
      ctx.font = '12px sans-serif'
      ctx.textAlign = 'center'
      ctx.textBaseline = 'middle'
      ctx.fillStyle = '#475569'
      ctx.fillText(labels[i], lx, ly)
    }
  }
}

// ── Detail Panel ──
const overlay = document.getElementById('overlay')
const detail = document.getElementById('detail')

function openDetail(job) {
  const promoHTML = job.promoPath.map((step, i) => {
    const isCurrent = step.current
    const arrow = i < job.promoPath.length - 1 ? '<div class="promo-arrow">↓</div>' : ''
    return `
      <div class="promo-step ${isCurrent ? 'current' : ''}">
        <div class="level-badge" style="background:${step.color}">${step.level}</div>
        <div class="step-info">
          <div class="step-title">${step.title}</div>
          <div class="step-desc">${step.desc}</div>
        </div>
      </div>
      ${arrow}
    `
  }).join('')

  const transHTML = job.transitions.map(t => `
    <div class="trans-card" onclick="event.stopPropagation()">
      <div class="trans-name">${t.target}</div>
      <div class="overlap-bar"><div class="overlap-fill" style="width:${t.overlap}%"></div></div>
      <div class="overlap-text">技能重合度 ${t.overlap}%</div>
      <div class="gap-skills">需补充：${t.gaps.join('、')}</div>
    </div>
  `).join('')

  const reqHTML = Object.entries(job.abilities).map(([k, v]) => {
    const color = v >= 80 ? '#22c55e' : v >= 60 ? '#f59e0b' : '#ef4444'
    return `<div class="req-item"><div class="req-dot" style="background:${color}"></div>${k} <strong>${v}</strong></div>`
  }).join('')

  detail.innerHTML = `
    <button class="detail-close" onclick="closeDetail()">✕</button>
    <h2>${job.name}</h2>
    <div class="meta">${job.family} · <span class="zone ${ZONE_CLS[job.zone]}" style="font-size:12px">${ZONE_MAP[job.zone]}</span>
      ${job.certs.length ? ' · 推荐证书：' + job.certs.join('、') : ''}</div>

    <div class="radar-wrap"><canvas id="detail-radar" width="300" height="300"></canvas></div>

    <div class="detail-section">
      <h3>岗位能力要求</h3>
      <div class="req-grid">${reqHTML}</div>
    </div>

    <div class="detail-section">
      <h3>核心技能</h3>
      <div class="skill-tags">${job.skills.map(s=>`<span class="skill-tag">${s}</span>`).join('')}</div>
    </div>

    <div class="detail-section">
      <h3>🔼 晋升路径</h3>
      <div class="promo-path">${promoHTML}</div>
    </div>

    <div class="detail-section">
      <h3>🔄 换岗路径（${job.transitions.length}条）</h3>
      <div class="transition-grid">${transHTML}</div>
    </div>
  `

  overlay.classList.add('open')
  setTimeout(() => drawRadar(document.getElementById('detail-radar'), job.abilities, 110, false), 0)
}

function closeDetail() { overlay.classList.remove('open') }
overlay.addEventListener('click', e => { if (e.target === overlay) closeDetail() })
</script>
