<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>岗位探索器 — Hub & Spoke</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#f8fafc;font-family:-apple-system,'PingFang SC','Microsoft YaHei',sans-serif;color:#1e293b;min-height:100vh}

/* ── Top Bar ── */
.topbar{background:#fff;border-bottom:1px solid #e2e8f0;padding:12px 24px;display:flex;align-items:center;gap:16px;position:sticky;top:0;z-index:20}
.topbar h1{font-size:15px;font-weight:700;color:#334155;white-space:nowrap}
.family-chips{display:flex;gap:6px;overflow-x:auto;flex:1}
.family-chip{padding:5px 14px;border-radius:8px;font-size:12px;font-weight:500;border:1px solid #e2e8f0;background:#fff;color:#64748b;cursor:pointer;white-space:nowrap;transition:all .15s}
.family-chip:hover{border-color:#a78bfa;color:#7c3aed}
.family-chip.active{background:#7c3aed;color:#fff;border-color:#7c3aed}

.container{max-width:960px;margin:0 auto;padding:32px 20px}

/* ── Breadcrumb trail ── */
.breadcrumb{display:flex;align-items:center;gap:6px;margin-bottom:20px;font-size:13px;color:#94a3b8;flex-wrap:wrap}
.breadcrumb span{cursor:pointer;transition:color .15s}
.breadcrumb span:hover{color:#7c3aed}
.breadcrumb .sep{color:#cbd5e1;cursor:default}
.breadcrumb .current{color:#334155;font-weight:600;cursor:default}

/* ── Hero Card ── */
.hero{background:#fff;border:2px solid #e2e8f0;border-radius:16px;padding:28px;margin-bottom:28px;transition:all .3s;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;top:0;left:0;right:0;height:4px}
.hero.zone-safe::before{background:linear-gradient(90deg,#22c55e,#4ade80)}
.hero.zone-transition::before{background:linear-gradient(90deg,#f59e0b,#fbbf24)}
.hero.zone-danger::before{background:linear-gradient(90deg,#ef4444,#f87171)}
.hero-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:20px}
.hero-title{font-size:24px;font-weight:800;letter-spacing:-0.5px}
.hero-meta{font-size:13px;color:#64748b;margin-top:4px}
.zone-badge{display:inline-block;font-size:11px;padding:3px 10px;border-radius:6px;font-weight:600;margin-top:8px}
.z-safe{background:#dcfce7;color:#16a34a}
.z-transition{background:#fef3c7;color:#d97706}
.z-danger{background:#fee2e2;color:#dc2626}

.hero-body{display:grid;grid-template-columns:200px 1fr;gap:24px;align-items:start}
@media(max-width:640px){.hero-body{grid-template-columns:1fr}}

/* Radar */
.radar-wrap{display:flex;justify-content:center}

/* Ability bars */
.abilities{display:flex;flex-direction:column;gap:6px}
.ab-row{display:flex;align-items:center;gap:8px}
.ab-label{font-size:12px;color:#64748b;width:56px;text-align:right;flex-shrink:0}
.ab-track{flex:1;height:8px;background:#f1f5f9;border-radius:4px;overflow:hidden}
.ab-fill{height:100%;border-radius:4px;transition:width .5s ease}
.ab-val{font-size:11px;font-weight:700;width:28px;color:#334155}
.skill-row{margin-top:12px;display:flex;flex-wrap:wrap;gap:5px}
.skill-tag{font-size:11px;background:#f1f5f9;color:#475569;padding:3px 9px;border-radius:5px}
.cert-tag{font-size:11px;background:#ede9fe;color:#6d28d9;padding:3px 9px;border-radius:5px}

/* ── Section ── */
.section{margin-bottom:32px}
.section-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.section-title{font-size:14px;font-weight:700;color:#475569;display:flex;align-items:center;gap:6px}

/* ── Promotion Path (horizontal timeline) ── */
.promo-timeline{display:flex;align-items:center;gap:0;overflow-x:auto;padding:8px 0}
.promo-node{display:flex;flex-direction:column;align-items:center;cursor:pointer;transition:all .2s;flex-shrink:0;padding:0 8px}
.promo-node:hover{transform:translateY(-2px)}
.promo-node.current .promo-circle{border-color:#7c3aed;box-shadow:0 0 0 3px rgba(124,58,237,.15)}
.promo-circle{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;border:2px solid transparent}
.promo-label{font-size:11px;font-weight:600;color:#334155;margin-top:6px;text-align:center;max-width:80px;line-height:1.3}
.promo-desc{font-size:10px;color:#94a3b8;text-align:center}
.promo-connector{width:32px;height:2px;background:#e2e8f0;flex-shrink:0;position:relative}
.promo-connector::after{content:'›';position:absolute;right:-2px;top:-8px;color:#cbd5e1;font-size:14px}

/* ── Transition Cards (the key interaction) ── */
.trans-list{display:flex;flex-direction:column;gap:10px}
.trans-card{background:#fff;border:1px solid #e2e8f0;border-radius:12px;padding:16px 18px;cursor:pointer;transition:all .2s;display:grid;grid-template-columns:1fr auto;gap:12px;align-items:center}
.trans-card:hover{border-color:#a78bfa;box-shadow:0 4px 16px rgba(124,58,237,.06);transform:translateX(4px)}
.trans-left{min-width:0}
.trans-name{font-size:15px;font-weight:700;margin-bottom:3px}
.trans-meta{font-size:11px;color:#94a3b8}
.trans-gaps{display:flex;flex-wrap:wrap;gap:4px;margin-top:8px}
.gap-tag{font-size:10px;background:#fef3c7;color:#92400e;padding:2px 7px;border-radius:4px}
.trans-right{text-align:center;flex-shrink:0;width:72px}
.overlap-ring{width:56px;height:56px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-direction:column;margin:0 auto}
.overlap-ring .pct{font-size:16px;font-weight:800}
.overlap-ring .lbl{font-size:9px;color:#94a3b8;margin-top:-2px}
.ring-high{background:#dcfce7;color:#15803d}
.ring-mid{background:#fef9c3;color:#a16207}
.ring-low{background:#fee2e2;color:#dc2626}
.trans-arrow{font-size:18px;color:#cbd5e1;margin-left:8px}

/* ── Empty / hint ── */
.hint{text-align:center;padding:40px;color:#94a3b8;font-size:13px}

/* Smooth navigation animation */
.hero.navigating{opacity:0;transform:translateY(10px)}
.hero.entering{animation:slideIn .35s ease forwards}
@keyframes slideIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>

  const j = jobMap.get(toId);
  if (j) return j.name;
  const names = {fs:'全栈工程师',mo:'移动端工程师',ds:'数据科学家',quant:'量化工程师',pm_ai:'AI产品经理',

const ZONE_MAP={safe:'安全区',transition:'过渡区',danger:'危险区'};
const ZONE_CLS={safe:'z-safe',transition:'z-transition',danger:'z-danger'};
const ZONE_DOT={safe:'#22c55e',transition:'#f59e0b',danger:'#ef4444'};

let currentId = 'fe';
let history = [];

// ── Family Chips ──
const families = [...new Set(JOBS.map(j => j.family))];
const chipsEl = document.getElementById('chips');
families.forEach(f => {
  const chip = document.createElement('span');
  chip.className = 'family-chip';
  chip.textContent = f;
  chip.onclick = () => {
    const first = JOBS.find(j => j.family === f);
    if (first) navigateTo(first.id);
  };
  chipsEl.appendChild(chip);
});

function updateChips(activeFamily) {
  document.querySelectorAll('.family-chip').forEach(c => {
    c.classList.toggle('active', c.textContent === activeFamily);
  });
}

// ── Navigation ──
function navigateTo(id) {
  const job = jobMap.get(id);
  if (!job) return;
  if (currentId !== id) {
    history.push(currentId);
    if (history.length > 10) history.shift();
  }
  currentId = id;
  render(job);
}

function navigateBack(toId) {
  const idx = history.lastIndexOf(toId);
  if (idx >= 0) history = history.slice(0, idx);
  currentId = toId;
  render(jobMap.get(toId));
}

// ── Render ──
function render(job) {
  updateChips(job.family);
  renderBreadcrumb(job);
  renderHero(job);
  renderPromo(job);
  renderTransitions(job);
}

function renderBreadcrumb(job) {
  const bc = document.getElementById('breadcrumb');
  const trail = [...history.map(id => jobMap.get(id)?.name || id), job.name];
  const ids = [...history, job.id];
  bc.innerHTML = trail.map((name, i) => {
    if (i === trail.length - 1) return `<span class="current">${name}</span>`;
    return `<span onclick="navigateBack('${ids[i]}')">${name}</span><span class="sep">›</span>`;
  }).join('');
}

function renderHero(job) {
  const hero = document.getElementById('hero');
  hero.className = `hero zone-${job.zone} entering`;

  const barsHTML = Object.entries(job.abilities).map(([k, v]) => {
    const color = v >= 80 ? '#7c3aed' : v >= 60 ? '#a78bfa' : '#c4b5fd';
    return `<div class="ab-row"><span class="ab-label">${k}</span><div class="ab-track"><div class="ab-fill" style="width:${v}%;background:${color}"></div></div><span class="ab-val">${v}</span></div>`;
  }).join('');

  hero.innerHTML = `
    <div class="hero-top">
      <div>
        <div class="hero-title">${job.name}</div>
        <div class="hero-meta">${job.family}${job.certs.length ? ' · ' + job.certs.join('、') : ''}</div>
        <span class="zone-badge ${ZONE_CLS[job.zone]}">${ZONE_MAP[job.zone]}</span>
      </div>
    </div>
    <div class="hero-body">
      <div class="radar-wrap"><canvas id="heroRadar" width="180" height="180"></canvas></div>
      <div>
        <div class="abilities">${barsHTML}</div>
        <div class="skill-row">
          ${job.skills.map(s => `<span class="skill-tag">${s}</span>`).join('')}
          ${job.certs.map(c => `<span class="cert-tag">${c}</span>`).join('')}
        </div>
      </div>
    </div>
  `;

  setTimeout(() => drawRadar(document.getElementById('heroRadar'), job.abilities, 68), 10);
  setTimeout(() => hero.classList.remove('entering'), 350);
}

function renderPromo(job) {
  const tl = document.getElementById('promoTimeline');
  tl.innerHTML = job.promo.map((s, i) => {
    const connector = i < job.promo.length - 1 ? '<div class="promo-connector"></div>' : '';
    return `
      <div class="promo-node ${s.cur ? 'current' : ''}">
        <div class="promo-circle" style="background:${s.c}">${s.lv}</div>
        <div class="promo-label">${s.t}</div>
        <div class="promo-desc">${s.d}</div>
      </div>
      ${connector}
    `;
  }).join('');
}

function renderTransitions(job) {
  const list = document.getElementById('transList');
  list.innerHTML = job.trans.map(t => {
    const resolved = jobMap.get(t.to);
    const name = getTransName(t.to);
    const zoneDot = resolved ? `<span style="display:inline-block;width:7px;height:7px;border-radius:50%;background:${ZONE_DOT[resolved.zone]};margin-right:4px;vertical-align:middle"></span>` : '';
    const familyText = resolved ? resolved.family : '';
    const ringCls = t.overlap >= 65 ? 'ring-high' : t.overlap >= 50 ? 'ring-mid' : 'ring-low';
    const clickable = resolved ? `onclick="navigateTo('${t.to}')"` : '';
    const cursorCls = resolved ? '' : 'style="cursor:default;opacity:0.7"';

    return `
      <div class="trans-card" ${clickable} ${cursorCls}>
        <div class="trans-left">
          <div class="trans-name">${zoneDot}${name}</div>
          <div class="trans-meta">${familyText}${!resolved ? ' · 暂未收录' : ''}</div>
          <div class="trans-gaps">${t.gaps.map(g => `<span class="gap-tag">${g}</span>`).join('')}</div>
        </div>
        <div class="trans-right">
          <div class="overlap-ring ${ringCls}">
            <span class="pct">${t.overlap}%</span>
            <span class="lbl">重合</span>
          </div>
        </div>
      </div>
    `;
  }).join('');
}

// ── Radar ──
function drawRadar(canvas, abilities, size) {
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const cx = canvas.width / 2, cy = canvas.height / 2;
  const keys = Object.keys(abilities), vals = Object.values(abilities), n = keys.length, r = size;

  for (let ring = 1; ring <= 4; ring++) {
    const rr = r * ring / 4;
    ctx.beginPath();
    for (let i = 0; i <= n; i++) {
      const a = (i / n) * Math.PI * 2 - Math.PI / 2;
      i === 0 ? ctx.moveTo(cx + Math.cos(a) * rr, cy + Math.sin(a) * rr) : ctx.lineTo(cx + Math.cos(a) * rr, cy + Math.sin(a) * rr);
    }
    ctx.strokeStyle = '#e2e8f0'; ctx.lineWidth = 0.5; ctx.stroke();
  }
  for (let i = 0; i < n; i++) {
    const a = (i / n) * Math.PI * 2 - Math.PI / 2;
    ctx.beginPath(); ctx.moveTo(cx, cy);
    ctx.lineTo(cx + Math.cos(a) * r, cy + Math.sin(a) * r);
    ctx.strokeStyle = '#e2e8f0'; ctx.lineWidth = 0.5; ctx.stroke();
  }
  ctx.beginPath();
  for (let i = 0; i <= n; i++) {
    const idx = i % n, a = (idx / n) * Math.PI * 2 - Math.PI / 2;
    const v = vals[idx] / 100 * r;
    i === 0 ? ctx.moveTo(cx + Math.cos(a) * v, cy + Math.sin(a) * v) : ctx.lineTo(cx + Math.cos(a) * v, cy + Math.sin(a) * v);
  }
  ctx.fillStyle = 'rgba(124,58,237,0.12)'; ctx.fill();
  ctx.strokeStyle = '#7c3aed'; ctx.lineWidth = 1.5; ctx.stroke();
  for (let i = 0; i < n; i++) {
    const a = (i / n) * Math.PI * 2 - Math.PI / 2;
    const v = vals[i] / 100 * r;
    ctx.beginPath(); ctx.arc(cx + Math.cos(a) * v, cy + Math.sin(a) * v, 2.5, 0, Math.PI * 2);
    ctx.fillStyle = '#7c3aed'; ctx.fill();
    const lx = cx + Math.cos(a) * (r + 16), ly = cy + Math.sin(a) * (r + 16);
    ctx.font = '10px sans-serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillStyle = '#475569'; ctx.fillText(keys[i], lx, ly);
  }
}

// ── Init ──
render(JOBS[0]);
</script>
