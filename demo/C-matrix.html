<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>方案C — 交互式矩阵</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#f8fafc;font-family:-apple-system,'PingFang SC','Microsoft YaHei',sans-serif;color:#1e293b}
.header{background:#fff;border-bottom:1px solid #e2e8f0;padding:14px 24px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:20}
.header h1{font-size:16px;font-weight:700;color:#334155}
.header .badge{font-size:11px;background:#f1f5f9;color:#64748b;padding:3px 10px;border-radius:6px}
.container{padding:24px;max-width:1400px;margin:0 auto}

/* Legend */
.legend{display:flex;gap:16px;margin-bottom:16px;font-size:12px;color:#64748b;align-items:center}
.legend-item{display:flex;align-items:center;gap:4px}
.legend-box{width:20px;height:12px;border-radius:2px}

/* Matrix */
.matrix-wrap{overflow-x:auto;border-radius:12px;border:1px solid #e2e8f0;background:#fff}
table{border-collapse:collapse;width:100%;min-width:900px}
th,td{padding:0;text-align:center;border:1px solid #f1f5f9}
th{background:#f8fafc;font-size:11px;font-weight:600;color:#64748b;padding:10px 6px;position:sticky;top:0;z-index:5}
th.col-header{writing-mode:vertical-lr;text-orientation:mixed;height:100px;white-space:nowrap}
th.row-header{text-align:left;padding:8px 12px;font-size:13px;font-weight:600;color:#334155;background:#fff;position:sticky;left:0;z-index:6;min-width:120px}
th.corner{position:sticky;left:0;z-index:7;background:#f8fafc}

.cell{width:100%;height:50px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s;font-size:12px;font-weight:600;position:relative}
.cell:hover{transform:scale(1.1);z-index:2;box-shadow:0 2px 8px rgba(0,0,0,.1);border-radius:4px}
.cell-self{background:#f5f3ff;color:#7c3aed;cursor:default}
.cell-high{background:#dcfce7;color:#15803d}
.cell-mid{background:#fef9c3;color:#a16207}
.cell-low{background:#fee2e2;color:#dc2626}
.cell-none{background:#f8fafc;color:#cbd5e1}

/* Expand Panel */
.expand-panel{display:none;position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:2px solid #7c3aed;box-shadow:0 -8px 30px rgba(0,0,0,.1);z-index:30;padding:20px 28px;max-height:40vh;overflow-y:auto}
.expand-panel.open{display:block}
.expand-close{float:right;background:none;border:none;font-size:18px;cursor:pointer;color:#94a3b8;padding:4px 8px;border-radius:6px}
.expand-close:hover{background:#f1f5f9}
.expand-head{display:flex;align-items:center;gap:16px;margin-bottom:16px}
.expand-head h3{font-size:16px;font-weight:700}
.expand-arrow{color:#7c3aed;font-size:20px}
.expand-body{display:grid;grid-template-columns:1fr 1fr;gap:20px}
.expand-col h4{font-size:13px;font-weight:600;color:#64748b;margin-bottom:8px}
.expand-col .skill-list{display:flex;flex-wrap:wrap;gap:4px}
.expand-col .skill-tag{font-size:11px;padding:3px 8px;border-radius:4px}
.shared{background:#dcfce7;color:#15803d}
.gap{background:#fee2e2;color:#dc2626}
.overlap-big{font-size:28px;font-weight:800;color:#7c3aed}
.overlap-label{font-size:12px;color:#94a3b8}

/* Row zone indicator */
.zone-dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:6px;vertical-align:middle}
</style>
</head>
<body>

<div class="header">
  <h1>方案C — 交互式岗位转换矩阵</h1>
  <span class="badge">点击单元格查看技能差异详情</span>
</div>

<div class="container">
  <div class="legend">
    <span>转换可行性：</span>
    <div class="legend-item"><div class="legend-box" style="background:#dcfce7"></div> 高（≥65%）</div>
    <div class="legend-item"><div class="legend-box" style="background:#fef9c3"></div> 中（50-64%）</div>
    <div class="legend-item"><div class="legend-box" style="background:#fee2e2"></div> 低（<50%）</div>
    <div class="legend-item"><div class="legend-box" style="background:#f5f3ff"></div> 自身</div>
  </div>
  <div class="matrix-wrap">
    <table id="matrix"></table>
  </div>
</div>

<div class="expand-panel" id="expandPanel">
  <button class="expand-close" onclick="closePanel()">✕</button>
  <div id="expandContent"></div>
</div>

<script>
const JOBS=[
  {id:"fe",name:"前端工程师",zone:"safe",skills:["JavaScript","React","Vue","TypeScript","CSS","Webpack","HTML5","Git"]},
  {id:"be",name:"后端工程师",zone:"safe",skills:["Java","Go","Python","MySQL","Redis","Docker","微服务","Git"]},
  {id:"algo",name:"算法工程师",zone:"safe",skills:["Python","PyTorch","数学建模","特征工程","NumPy","Git","Linux","统计学"]},
  {id:"pm",name:"产品经理",zone:"transition",skills:["需求分析","PRD","数据分析","原型设计","用户研究","SQL","沟通","项目管理"]},
  {id:"devops",name:"DevOps工程师",zone:"safe",skills:["Docker","K8s","CI/CD","Linux","Terraform","监控","Python","Git"]},
  {id:"data",name:"数据分析师",zone:"transition",skills:["SQL","Python","Excel","Tableau","统计学","数据可视化","沟通","Git"]},
  {id:"test",name:"测试工程师",zone:"danger",skills:["Selenium","Pytest","JMeter","SQL","接口测试","Git","Linux","Python"]},
  {id:"ux",name:"交互设计师",zone:"transition",skills:["Figma","用户研究","信息架构","原型设计","设计系统","沟通","CSS","HTML5"]},
  {id:"sec",name:"安全工程师",zone:"safe",skills:["渗透测试","代码审计","安全架构","Linux","Python","密码学","网络协议","Git"]},
  {id:"llm",name:"大模型工程师",zone:"safe",skills:["Python","PyTorch","LLM微调","RAG","Prompt Engineering","Git","Linux","Docker"]},
];

const ZONE_DOT={safe:"#22c55e",transition:"#f59e0b",danger:"#ef4444"};

function computeOverlap(a,b){
  const setA=new Set(a.skills),setB=new Set(b.skills);
  let shared=0;
  for(const s of setA)if(setB.has(s))shared++;
  const union=new Set([...a.skills,...b.skills]).size;
  return Math.round(shared/union*100);
}

function getSharedAndGap(from,to){
  const setFrom=new Set(from.skills),setTo=new Set(to.skills);
  const shared=[],gap=[];
  for(const s of to.skills){
    if(setFrom.has(s))shared.push(s);else gap.push(s);
  }
  return{shared,gap};
}

// Build matrix
const table=document.getElementById("matrix");
let html='<thead><tr><th class="corner">从 \\ 到</th>';
JOBS.forEach(j=>{html+=`<th class="col-header"><span class="zone-dot" style="background:${ZONE_DOT[j.zone]}"></span>${j.name}</th>`});
html+='</tr></thead><tbody>';

JOBS.forEach((from,ri)=>{
  html+=`<tr><th class="row-header"><span class="zone-dot" style="background:${ZONE_DOT[from.zone]}"></span>${from.name}</th>`;
  JOBS.forEach((to,ci)=>{
    if(ri===ci){
      html+=`<td><div class="cell cell-self">—</div></td>`;
    }else{
      const overlap=computeOverlap(from,to);
      const cls=overlap>=65?"cell-high":overlap>=50?"cell-mid":"cell-low";
      html+=`<td><div class="cell ${cls}" data-from="${ri}" data-to="${ci}" onclick="expandCell(${ri},${ci})">${overlap}%</div></td>`;
    }
  });
  html+='</tr>';
});
html+='</tbody>';
table.innerHTML=html;

// Expand panel
const panel=document.getElementById("expandPanel"),content=document.getElementById("expandContent");

function expandCell(fi,ti){
  const from=JOBS[fi],to=JOBS[ti];
  const{shared,gap}=getSharedAndGap(from,to);
  const overlap=computeOverlap(from,to);

  content.innerHTML=`
    <div class="expand-head">
      <h3>${from.name}</h3>
      <span class="expand-arrow">→</span>
      <h3>${to.name}</h3>
      <div style="margin-left:auto;text-align:center">
        <div class="overlap-big">${overlap}%</div>
        <div class="overlap-label">技能重合度</div>
      </div>
    </div>
    <div class="expand-body">
      <div class="expand-col">
        <h4>已具备技能（${shared.length}项）</h4>
        <div class="skill-list">${shared.map(s=>`<span class="skill-tag shared">${s}</span>`).join("")||'<span style="color:#94a3b8;font-size:12px">无重合技能</span>'}</div>
      </div>
      <div class="expand-col">
        <h4>需补充技能（${gap.length}项）</h4>
        <div class="skill-list">${gap.map(s=>`<span class="skill-tag gap">${s}</span>`).join("")||'<span style="color:#94a3b8;font-size:12px">无需补充</span>'}</div>
      </div>
    </div>
  `;
  panel.classList.add("open");
}

function closePanel(){panel.classList.remove("open")}
</script>
</body>
</html>
