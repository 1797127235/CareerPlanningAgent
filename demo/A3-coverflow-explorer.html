<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>岗位探索器 — Coverflow</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --primary: #6366F1;
  --primary-light: #818CF8;
  --primary-bg: #F5F3FF;
  --cta: #10B981;
  --text: #1E1B4B;
  --text-muted: #64748B;
  --bg: #F8FAFC;
  --card-bg: #FFFFFF;
  --border: #E2E8F0;
  --safe: #22C55E;
  --transition: #F59E0B;
  --danger: #EF4444;
  --radius: 20px;
  --shadow: 0 8px 32px rgba(99,102,241,.10);
  --shadow-lg: 0 16px 48px rgba(99,102,241,.18);
  --font: 'Plus Jakarta Sans', -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { background:var(--bg); font-family:var(--font); color:var(--text); overflow-x:hidden; min-height:100vh; }

/* ── Top Bar ── */
.topbar {
  position:sticky; top:0; z-index:30; background:rgba(255,255,255,.85);
  backdrop-filter:blur(12px); border-bottom:1px solid var(--border);
  padding:12px 24px; display:flex; align-items:center; justify-content:center;
}

/* Search */
.search-wrap { position:relative; width:100%; max-width:480px; }
.search-input {
  width:100%; padding:9px 14px 9px 36px; border:1.5px solid var(--border);
  border-radius:10px; font-size:13px; font-family:var(--font); color:var(--text);
  background:var(--card-bg); outline:none; transition:border-color .2s;
}
.search-input:focus { border-color:var(--primary); }
.search-icon { position:absolute; left:11px; top:50%; transform:translateY(-50%); width:16px; height:16px; color:var(--text-muted); pointer-events:none; }
.search-dropdown {
  position:absolute; top:calc(100% + 4px); left:0; right:0; background:var(--card-bg);
  border:1px solid var(--border); border-radius:12px; box-shadow:var(--shadow);
  max-height:240px; overflow-y:auto; display:none; z-index:40;
}
.search-dropdown.open { display:block; }
.search-item {
  padding:10px 14px; cursor:pointer; font-size:13px; display:flex;
  align-items:center; gap:8px; transition:background .12s;
}
.search-item:hover { background:var(--primary-bg); }
.search-item .dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }


/* ── Coverflow ── */
.coverflow-area {
  position:relative; height:520px; display:flex; align-items:center;
  justify-content:center; perspective:1200px; overflow:hidden; margin:24px 0;
}
.coverflow-track {
  position:relative; width:100%; height:100%; display:flex; align-items:center;
  justify-content:center; transition:transform .5s cubic-bezier(.23,1,.32,1);
}

/* Cards */
.cf-card {
  position:absolute; width:380px; height:460px; border-radius:var(--radius);
  background:var(--card-bg); border:1.5px solid var(--border);
  box-shadow:var(--shadow); cursor:pointer; transition:all .5s cubic-bezier(.23,1,.32,1);
  transform-style:preserve-3d; backface-visibility:hidden;
  overflow:hidden;
}
.cf-card .card-front, .cf-card .card-back {
  position:absolute; inset:0; backface-visibility:hidden; border-radius:var(--radius);
  padding:24px; overflow-y:auto;
}
.cf-card .card-back {
  transform:rotateY(180deg); background:var(--card-bg);
}
.cf-card.flipped { transform:rotateY(180deg) !important; }
.cf-card.center { z-index:10; box-shadow:var(--shadow-lg); }
.cf-card.center:not(.flipped):hover { border-color:var(--primary-light); }

/* Card zone strip */
.zone-strip { position:absolute; top:0; left:0; right:0; height:4px; border-radius:var(--radius) var(--radius) 0 0; }
.zone-strip.safe { background:linear-gradient(90deg,var(--safe),#4ade80); }
.zone-strip.transition { background:linear-gradient(90deg,var(--transition),#fbbf24); }
.zone-strip.danger { background:linear-gradient(90deg,var(--danger),#f87171); }

/* Front */
.card-header { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:16px; margin-top:4px; }
.card-name { font-size:20px; font-weight:800; letter-spacing:-.3px; }
.zone-badge { font-size:10px; padding:3px 9px; border-radius:6px; font-weight:700; flex-shrink:0; }
.zb-safe { background:#DCFCE7; color:#15803D; }
.zb-transition { background:#FEF3C7; color:#D97706; }
.zb-danger { background:#FEE2E2; color:#DC2626; }
.card-family { font-size:12px; color:var(--text-muted); margin-bottom:14px; }
.card-match { font-size:11px; color:var(--primary); font-weight:600; margin-bottom:16px; }
.card-match span { font-size:22px; font-weight:800; }

.radar-center { display:flex; justify-content:center; margin-bottom:14px; }
.skills-wrap { display:flex; flex-wrap:wrap; gap:5px; margin-bottom:16px; }
.skill-chip { font-size:11px; background:var(--primary-bg); color:var(--primary); padding:3px 10px; border-radius:6px; font-weight:500; }
.cert-chip { font-size:11px; background:#FEF3C7; color:#92400E; padding:3px 10px; border-radius:6px; font-weight:500; }

/* Action bar */
.action-bar { display:flex; gap:8px; margin-top:auto; padding-top:12px; border-top:1px solid #F1F5F9; }
.action-btn {
  flex:1; padding:8px 0; border:1.5px solid var(--border); border-radius:10px;
  background:var(--card-bg); font-size:11px; font-weight:600; color:var(--text-muted);
  cursor:pointer; transition:all .2s; font-family:var(--font); display:flex;
  align-items:center; justify-content:center; gap:4px;
}
.action-btn:hover { border-color:var(--primary); color:var(--primary); background:var(--primary-bg); }
.action-btn.primary-btn { background:var(--primary); color:#fff; border-color:var(--primary); }
.action-btn.primary-btn:hover { background:#4F46E5; }
.flip-hint { text-align:center; font-size:11px; color:var(--text-muted); margin-top:8px; }

/* ── Progressive Reveal Animations ── */
@keyframes fadeUp { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
@keyframes countUp { from { opacity:0; transform:scale(.6); } to { opacity:1; transform:scale(1); } }
@keyframes chipIn { from { opacity:0; transform:scale(.8) translateY(6px); } to { opacity:1; transform:scale(1) translateY(0); } }
@keyframes radarDraw { from { opacity:0; transform:scale(.3) rotate(-10deg); } to { opacity:1; transform:scale(1) rotate(0deg); } }
@keyframes slideRight { from { opacity:0; transform:translateX(-16px); } to { opacity:1; transform:translateX(0); } }
@keyframes slideDown { from { opacity:0; transform:translateY(-8px); } to { opacity:1; transform:translateY(0); } }

/* All animated children start hidden */
.cf-card .card-front .card-header,
.cf-card .card-front .card-match,
.cf-card .card-front .radar-center,
.cf-card .card-front .skills-wrap .skill-chip,
.cf-card .card-front .skills-wrap .cert-chip,
.cf-card .card-front .flip-hint { opacity:0; }

/* When card is center → trigger staggered reveal */
.cf-card.center .card-front .card-header { animation:fadeUp .4s ease forwards; animation-delay:.05s; }
.cf-card.center .card-front .card-match { animation:countUp .5s cubic-bezier(.23,1,.32,1) forwards; animation-delay:.15s; }
.cf-card.center .card-front .radar-center { animation:radarDraw .6s cubic-bezier(.23,1,.32,1) forwards; animation-delay:.25s; }
.cf-card.center .card-front .skills-wrap .skill-chip:nth-child(1) { animation:chipIn .3s ease forwards; animation-delay:.35s; }
.cf-card.center .card-front .skills-wrap .skill-chip:nth-child(2) { animation:chipIn .3s ease forwards; animation-delay:.40s; }
.cf-card.center .card-front .skills-wrap .skill-chip:nth-child(3) { animation:chipIn .3s ease forwards; animation-delay:.45s; }
.cf-card.center .card-front .skills-wrap .skill-chip:nth-child(4) { animation:chipIn .3s ease forwards; animation-delay:.50s; }
.cf-card.center .card-front .skills-wrap .skill-chip:nth-child(5) { animation:chipIn .3s ease forwards; animation-delay:.55s; }
.cf-card.center .card-front .skills-wrap .cert-chip { animation:chipIn .3s ease forwards; animation-delay:.60s; }
.cf-card.center .card-front .flip-hint { animation:fadeUp .3s ease forwards; animation-delay:.65s; }

/* Back side staggered reveal */
.cf-card .card-back .back-section,
.cf-card .card-back .flip-hint { opacity:0; }
.cf-card.center.flipped .card-back .back-section:nth-child(1) { animation:slideDown .4s ease forwards; animation-delay:.1s; }
.cf-card.center.flipped .card-back .back-section:nth-child(2) { animation:slideDown .4s ease forwards; animation-delay:.3s; }
.cf-card.center.flipped .card-back .flip-hint { animation:fadeUp .3s ease forwards; animation-delay:.5s; }

/* Back: promo steps stagger */
.cf-card .card-back .pm-step { opacity:0; }
.cf-card.center.flipped .card-back .pm-step:nth-child(1) { animation:slideRight .3s ease forwards; animation-delay:.15s; }
.cf-card.center.flipped .card-back .pm-step:nth-child(2) { animation:slideRight .3s ease forwards; animation-delay:.22s; }
.cf-card.center.flipped .card-back .pm-step:nth-child(3) { animation:slideRight .3s ease forwards; animation-delay:.29s; }
.cf-card.center.flipped .card-back .pm-step:nth-child(4) { animation:slideRight .3s ease forwards; animation-delay:.36s; }
.cf-card.center.flipped .card-back .pm-step:nth-child(5) { animation:slideRight .3s ease forwards; animation-delay:.43s; }
.cf-card .card-back .pm-arrow { opacity:0; }
.cf-card.center.flipped .card-back .pm-arrow { animation:fadeUp .2s ease forwards; animation-delay:.2s; }

/* Back: transition items stagger */
.cf-card .card-back .trans-item { opacity:0; }
.cf-card.center.flipped .card-back .trans-item:nth-child(1) { animation:slideRight .3s ease forwards; animation-delay:.35s; }
.cf-card.center.flipped .card-back .trans-item:nth-child(2) { animation:slideRight .3s ease forwards; animation-delay:.42s; }
.cf-card.center.flipped .card-back .trans-item:nth-child(3) { animation:slideRight .3s ease forwards; animation-delay:.49s; }
.cf-card.center.flipped .card-back .trans-item:nth-child(4) { animation:slideRight .3s ease forwards; animation-delay:.56s; }
.cf-card.center.flipped .card-back .trans-item:nth-child(5) { animation:slideRight .3s ease forwards; animation-delay:.63s; }

/* Respect reduced motion */
@media(prefers-reduced-motion:reduce) {
  .cf-card .card-front .card-header,
  .cf-card .card-front .card-match,
  .cf-card .card-front .radar-center,
  .cf-card .card-front .skills-wrap .skill-chip,
  .cf-card .card-front .skills-wrap .cert-chip,
  .cf-card .card-front .flip-hint,
  .cf-card .card-back .back-section,
  .cf-card .card-back .flip-hint,
  .cf-card .card-back .pm-step,
  .cf-card .card-back .pm-arrow,
  .cf-card .card-back .trans-item { opacity:1 !important; animation:none !important; }
}

/* Back */
.back-title { font-size:14px; font-weight:700; color:var(--text-muted); margin-bottom:10px; display:flex; align-items:center; gap:6px; }
.back-section { margin-bottom:18px; }

/* Promo timeline (back) */
.promo-mini { display:flex; flex-direction:column; gap:0; }
.pm-step { display:flex; align-items:center; gap:10px; padding:6px 8px; border-radius:8px; }
.pm-step.current { background:var(--primary-bg); }
.pm-badge { width:28px; height:28px; border-radius:6px; display:flex; align-items:center; justify-content:center; font-size:10px; font-weight:700; color:#fff; flex-shrink:0; }
.pm-info { flex:1; }
.pm-name { font-size:12px; font-weight:600; }
.pm-desc { font-size:10px; color:var(--text-muted); }
.pm-arrow { text-align:center; color:#CBD5E1; font-size:11px; margin:1px 0 1px 14px; }

/* Trans items (back) */
.trans-item {
  display:flex; align-items:center; gap:10px; padding:8px 10px;
  border-radius:10px; cursor:pointer; transition:all .15s; border:1px solid transparent;
}
.trans-item:hover { background:var(--primary-bg); border-color:var(--primary-light); }
.trans-info { flex:1; min-width:0; }
.trans-name { font-size:13px; font-weight:600; }
.trans-gaps { font-size:10px; color:var(--text-muted); margin-top:2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.overlap-mini { width:40px; height:40px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:800; flex-shrink:0; }
.om-high { background:#DCFCE7; color:#15803D; }
.om-mid { background:#FEF3C7; color:#D97706; }
.om-low { background:#FEE2E2; color:#DC2626; }

/* ── Nav arrows ── */
.nav-arrow {
  position:absolute; top:50%; transform:translateY(-50%); z-index:20;
  width:44px; height:44px; border-radius:50%; background:var(--card-bg);
  border:1.5px solid var(--border); display:flex; align-items:center; justify-content:center;
  cursor:pointer; box-shadow:0 4px 12px rgba(0,0,0,.06); transition:all .2s;
  color:var(--text-muted); font-size:18px;
}
.nav-arrow:hover { border-color:var(--primary); color:var(--primary); box-shadow:var(--shadow); }
.nav-arrow.left { left:max(16px, calc(50% - 280px)); }
.nav-arrow.right { right:max(16px, calc(50% - 280px)); }

/* ── Indicators ── */
.indicators { display:flex; justify-content:center; gap:6px; padding:0 24px 24px; }
.indicator {
  width:8px; height:8px; border-radius:50%; cursor:pointer;
  transition:all .25s; opacity:.5;
}
.indicator.active { opacity:1; transform:scale(1.3); }

/* ── Compare overlay ── */
.compare-overlay {
  display:none; position:fixed; inset:0; background:rgba(30,27,75,.4);
  backdrop-filter:blur(6px); z-index:50; justify-content:center; align-items:center; padding:24px;
}
.compare-overlay.open { display:flex; }
.compare-panel {
  background:var(--card-bg); border-radius:var(--radius); max-width:700px; width:100%;
  padding:28px; box-shadow:var(--shadow-lg); max-height:80vh; overflow-y:auto;
}
.compare-head { display:flex; align-items:center; gap:16px; margin-bottom:20px; }
.compare-head h3 { font-size:16px; font-weight:800; }
.compare-arrow { color:var(--primary); font-size:22px; font-weight:800; }
.compare-close {
  margin-left:auto; background:none; border:none; font-size:18px;
  cursor:pointer; color:var(--text-muted); padding:6px 10px; border-radius:8px;
}
.compare-close:hover { background:#F1F5F9; }
.compare-body { display:grid; grid-template-columns:1fr 1fr; gap:20px; }
.compare-col h4 { font-size:12px; font-weight:700; color:var(--text-muted); margin-bottom:8px; }
.compare-skills { display:flex; flex-wrap:wrap; gap:4px; }
.cs-shared { font-size:11px; background:#DCFCE7; color:#15803D; padding:3px 8px; border-radius:5px; }
.cs-gap { font-size:11px; background:#FEE2E2; color:#DC2626; padding:3px 8px; border-radius:5px; }
.compare-stat { text-align:center; padding:16px 0; }
.compare-stat .big { font-size:36px; font-weight:800; color:var(--primary); }
.compare-stat .lbl { font-size:12px; color:var(--text-muted); }
.compare-nav {
  margin-top:16px; text-align:center;
}
.compare-nav button {
  padding:10px 24px; border-radius:10px; font-size:13px; font-weight:700;
  background:var(--primary); color:#fff; border:none; cursor:pointer;
  font-family:var(--font); transition:background .2s;
}
.compare-nav button:hover { background:#4F46E5; }

/* ── Responsive ── */
@media(max-width:640px) {
  .cf-card { width:300px; height:420px; }
  .cf-card .card-front, .cf-card .card-back { padding:18px; }
  .nav-arrow.left { left:8px; }
  .nav-arrow.right { right:8px; }
}
</style>
</head>

<!-- Top Bar -->
<div class="topbar">
  <div class="search-wrap">
    <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
    <input class="search-input" id="searchInput" placeholder="搜索岗位..." autocomplete="off">
    <div class="search-dropdown" id="searchDrop"></div>

</div>

<!-- Coverflow -->
<div class="coverflow-area" id="cfArea">
  <div class="nav-arrow left" id="navLeft">

</div>

<!-- Indicators -->
<div class="indicators" id="indicators"></div>

<!-- Compare Overlay -->
<div class="compare-overlay" id="compareOverlay">
  <div class="compare-panel" id="comparePanel"></div>
</div>

const jobMap=new Map(JOBS.map(j=>[j.id,j]));
const ZONE_MAP={safe:"安全区",transition:"过渡区",danger:"危险区"};
const ZONE_CLS={safe:"zb-safe",transition:"zb-transition",danger:"zb-danger"};
const ZONE_DOT={safe:"var(--safe)",transition:"var(--transition)",danger:"var(--danger)"};

let currentIdx=0;
let filteredJobs=[...JOBS].sort((a,b)=>b.match-a.match);
let flippedCards=new Set();

function filterBy(fam){
  filteredJobs=fam?JOBS.filter(j=>j.family===fam).sort((a,b)=>b.match-a.match):[...JOBS].sort((a,b)=>b.match-a.match);
  currentIdx=0; flippedCards.clear();
  buildCards(); updatePositions();
}

// ── Search ──
const searchInput=document.getElementById("searchInput"),searchDrop=document.getElementById("searchDrop");
searchInput.addEventListener("input",()=>{
  const q=searchInput.value.trim().toLowerCase();
  if(!q){searchDrop.classList.remove("open");return}
  const matches=JOBS.filter(j=>j.name.toLowerCase().includes(q)||j.family.toLowerCase().includes(q));
  if(!matches.length){searchDrop.classList.remove("open");return}
  searchDrop.innerHTML=matches.map(j=>`<div class="search-item" data-id="${j.id}"><span class="dot" style="background:${ZONE_DOT[j.zone]}"></span>${j.name}<span style="color:var(--text-muted);font-size:11px;margin-left:auto">${j.family}</span></div>`).join("");
  searchDrop.classList.add("open");
  searchDrop.querySelectorAll(".search-item").forEach(el=>el.onclick=()=>{
    const id=el.dataset.id;
    // Reset filter to all
    filterBy(null);
    const idx=filteredJobs.findIndex(j=>j.id===id);
    if(idx>=0){currentIdx=idx;updatePositions()}
    searchInput.value="";searchDrop.classList.remove("open");
  });
});
document.addEventListener("click",e=>{if(!e.target.closest(".search-wrap"))searchDrop.classList.remove("open")});

          </div>
          <div class="back-section">
            <div class="back-title"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3M3 16v3a2 2 0 0 0 2 2h3m8 0h3a2 2 0 0 0 2-2v-3"/></svg> 换岗路径</div>
            ${job.trans.map(t=>{const target=jobMap.get(t.to);const name=target?target.name:t.to;const cls=t.overlap>=60?"om-high":t.overlap>=45?"om-mid":"om-low";return`<div class="trans-item" data-from="${job.id}" data-to="${t.to}" data-overlap="${t.overlap}"><div class="trans-info"><div class="trans-name">${name}</div><div class="trans-gaps">需补充：${t.gaps.join("、")}</div></div><div class="overlap-mini ${cls}">${t.overlap}%</div></div>`}).join("")}
          </div>

    card.addEventListener("click",e=>{

      if(parseInt(card.dataset.idx)===currentIdx){

// ── Position cards ──
function updatePositions(){
  const cards=track.querySelectorAll(".cf-card");
  cards.forEach((card,i)=>{
    const offset=i-currentIdx;
    const wasCenter=card.classList.contains("center");
    const isCenter=offset===0;
    card.classList.toggle("center",isCenter);
    if(!isCenter)card.classList.remove("flipped"),flippedCards.delete(i);
    const tx=offset*220;
    const sc=isCenter?1:0.75;
    const ry=isCenter?0:offset<0?35:-35;
    const op=Math.abs(offset)>2?0:isCenter?1:0.6;
    const z=100-Math.abs(offset)*10;
    card.style.transform=`translateX(${tx}px) scale(${sc}) rotateY(${ry}deg)`;
    card.style.opacity=op;
    card.style.zIndex=z;
    card.style.pointerEvents=Math.abs(offset)>2?"none":"auto";

    // Trigger count-up + radar animation when becoming center
    if(isCenter&&!wasCenter){
      const matchEl=card.querySelector(".card-match span");
      const job=filteredJobs[i];
      if(matchEl&&job) animateCount(matchEl,0,job.match,500,150);
      const cv=card.querySelector(".radar-cv");
      if(cv&&job) animateRadar(cv,job.abilities,60);
    }
  });
  updateIndicators();
}

// Count-up animation
function animateCount(el,from,to,duration,delay){
  el.textContent="0%";
  setTimeout(()=>{
    const start=performance.now();
    function tick(now){
      const t=Math.min((now-start)/duration,1);
      const eased=1-Math.pow(1-t,3);
      el.textContent=Math.round(from+(to-from)*eased)+"%";
      if(t<1)requestAnimationFrame(tick);
    }
    requestAnimationFrame(tick);
  },delay);
}

// Animated radar draw
function animateRadar(canvas,abilities,size){
  const ctx=canvas.getContext("2d"),cx=canvas.width/2,cy=canvas.height/2;
  const keys=Object.keys(abilities),vals=Object.values(abilities),n=keys.length,r=size;
  let progress=0;
  const duration=600,start=performance.now();

  function frame(now){
    progress=Math.min((now-start)/duration,1);
    const ease=1-Math.pow(1-progress,3);
    ctx.clearRect(0,0,canvas.width,canvas.height);

    // Grid (instant)
    for(let ring=1;ring<=4;ring++){const rr=r*ring/4;ctx.beginPath();for(let i=0;i<=n;i++){const a=(i/n)*Math.PI*2-Math.PI/2;i===0?ctx.moveTo(cx+Math.cos(a)*rr,cy+Math.sin(a)*rr):ctx.lineTo(cx+Math.cos(a)*rr,cy+Math.sin(a)*rr)}ctx.strokeStyle="#E2E8F0";ctx.lineWidth=.5;ctx.stroke()}
    for(let i=0;i<n;i++){const a=(i/n)*Math.PI*2-Math.PI/2;ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(cx+Math.cos(a)*r,cy+Math.sin(a)*r);ctx.strokeStyle="#E2E8F0";ctx.lineWidth=.5;ctx.stroke()}

    // Data polygon (animated)
    ctx.beginPath();
    for(let i=0;i<=n;i++){const idx=i%n,a=(idx/n)*Math.PI*2-Math.PI/2,v=vals[idx]/100*r*ease;i===0?ctx.moveTo(cx+Math.cos(a)*v,cy+Math.sin(a)*v):ctx.lineTo(cx+Math.cos(a)*v,cy+Math.sin(a)*v)}
    ctx.fillStyle=`rgba(99,102,241,${.12*ease})`;ctx.fill();
    ctx.strokeStyle="#6366F1";ctx.lineWidth=1.5;ctx.globalAlpha=ease;ctx.stroke();ctx.globalAlpha=1;

    // Dots + labels (fade in)
    for(let i=0;i<n;i++){const a=(i/n)*Math.PI*2-Math.PI/2,v=vals[i]/100*r*ease;
      ctx.beginPath();ctx.arc(cx+Math.cos(a)*v,cy+Math.sin(a)*v,2.5,0,Math.PI*2);ctx.fillStyle="#6366F1";ctx.globalAlpha=ease;ctx.fill();ctx.globalAlpha=1;
      if(progress>0.4){const labelAlpha=Math.min(1,(progress-.4)/.3);const lx=cx+Math.cos(a)*(r+14),ly=cy+Math.sin(a)*(r+14);ctx.font="500 9px 'Plus Jakarta Sans',sans-serif";ctx.textAlign="center";ctx.textBaseline="middle";ctx.fillStyle=`rgba(100,116,139,${labelAlpha})`;ctx.fillText(keys[i],lx,ly)}}

    if(progress<1)requestAnimationFrame(frame);
  }
  setTimeout(()=>requestAnimationFrame(frame),250);
}

// ── Indicators ──
const indicEl=document.getElementById("indicators");
function buildIndicators(){
  indicEl.innerHTML="";
  filteredJobs.forEach((job,i)=>{
    const d=document.createElement("div");
    d.className="indicator"+(i===currentIdx?" active":"");
    d.style.background=ZONE_DOT[job.zone];
    d.onclick=()=>{currentIdx=i;flippedCards.clear();updatePositions()};
    indicEl.appendChild(d);
  });
}
function updateIndicators(){
  indicEl.querySelectorAll(".indicator").forEach((d,i)=>d.classList.toggle("active",i===currentIdx));
}

// ── Nav ──
document.getElementById("navLeft").onclick=()=>{if(currentIdx>0){currentIdx--;flippedCards.clear();updatePositions()}};
document.getElementById("navRight").onclick=()=>{if(currentIdx<filteredJobs.length-1){currentIdx++;flippedCards.clear();updatePositions()}};
document.addEventListener("keydown",e=>{
  if(e.target===searchInput)return;
  if(e.key==="ArrowLeft"&&currentIdx>0){currentIdx--;flippedCards.clear();updatePositions()}
  if(e.key==="ArrowRight"&&currentIdx<filteredJobs.length-1){currentIdx++;flippedCards.clear();updatePositions()}
});

const cOverlay=document.getElementById("compareOverlay"),cPanel=document.getElementById("comparePanel");
function showCompare(fromId,toId,overlap){
  const from=jobMap.get(fromId),to=jobMap.get(toId);
  if(!from||!to)return;
  const shared=[],gap=[];
  const fromSet=new Set(from.skills);
  to.skills.forEach(s=>{if(fromSet.has(s))shared.push(s);else gap.push(s)});
  cPanel.innerHTML=`
    <button class="compare-close" onclick="closeCompare()">✕</button>
    <div class="compare-head">
      <h3>${from.name}</h3><span class="compare-arrow">→</span><h3>${to.name}</h3>
    </div>
    <div class="compare-stat"><div class="big">${overlap}%</div><div class="lbl">技能重合度</div></div>
    <div class="compare-body">
      <div class="compare-col"><h4>已具备（${shared.length}）</h4><div class="compare-skills">${shared.map(s=>`<span class="cs-shared">${s}</span>`).join("")||"<span style='color:var(--text-muted);font-size:12px'>无重合</span>"}</div></div>
      <div class="compare-col"><h4>需补充（${gap.length}）</h4><div class="compare-skills">${gap.map(s=>`<span class="cs-gap">${s}</span>`).join("")}</div></div>
    </div>
    <div class="compare-nav"><button onclick="jumpTo('${toId}')">前往 ${to.name}</button></div>
  `;
  cOverlay.classList.add("open");
}
function closeCompare(){cOverlay.classList.remove("open")}
function jumpTo(id){
  closeCompare();
  filterBy(null);
  const idx=filteredJobs.findIndex(j=>j.id===id);
  if(idx>=0){currentIdx=idx;flippedCards.clear();updatePositions()}
}
cOverlay.addEventListener("click",e=>{if(e.target===cOverlay)closeCompare()});

// ── Radar ──
function drawRadar(canvas,abilities,size){
  const ctx=canvas.getContext("2d"),cx=canvas.width/2,cy=canvas.height/2;
  const keys=Object.keys(abilities),vals=Object.values(abilities),n=keys.length,r=size;
  for(let ring=1;ring<=4;ring++){const rr=r*ring/4;ctx.beginPath();for(let i=0;i<=n;i++){const a=(i/n)*Math.PI*2-Math.PI/2;i===0?ctx.moveTo(cx+Math.cos(a)*rr,cy+Math.sin(a)*rr):ctx.lineTo(cx+Math.cos(a)*rr,cy+Math.sin(a)*rr)}ctx.strokeStyle="#E2E8F0";ctx.lineWidth=.5;ctx.stroke()}
  for(let i=0;i<n;i++){const a=(i/n)*Math.PI*2-Math.PI/2;ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(cx+Math.cos(a)*r,cy+Math.sin(a)*r);ctx.strokeStyle="#E2E8F0";ctx.lineWidth=.5;ctx.stroke()}
  ctx.beginPath();for(let i=0;i<=n;i++){const idx=i%n,a=(idx/n)*Math.PI*2-Math.PI/2,v=vals[idx]/100*r;i===0?ctx.moveTo(cx+Math.cos(a)*v,cy+Math.sin(a)*v):ctx.lineTo(cx+Math.cos(a)*v,cy+Math.sin(a)*v)}ctx.fillStyle="rgba(99,102,241,.12)";ctx.fill();ctx.strokeStyle="#6366F1";ctx.lineWidth=1.5;ctx.stroke();
  for(let i=0;i<n;i++){const a=(i/n)*Math.PI*2-Math.PI/2,v=vals[i]/100*r;ctx.beginPath();ctx.arc(cx+Math.cos(a)*v,cy+Math.sin(a)*v,2.5,0,Math.PI*2);ctx.fillStyle="#6366F1";ctx.fill();const lx=cx+Math.cos(a)*(r+14),ly=cy+Math.sin(a)*(r+14);ctx.font="500 9px 'Plus Jakarta Sans',sans-serif";ctx.textAlign="center";ctx.textBaseline="middle";ctx.fillStyle="#64748B";ctx.fillText(keys[i],lx,ly)}
}

// ── Init ──
buildCards();
updatePositions();
// Trigger first card animations
setTimeout(()=>{
  const firstCard=track.querySelector(".cf-card.center");
  if(firstCard){
    const matchEl=firstCard.querySelector(".card-match span");
    const cv=firstCard.querySelector(".radar-cv");
    if(matchEl)animateCount(matchEl,0,filteredJobs[0].match,500,150);
    if(cv)animateRadar(cv,filteredJobs[0].abilities,60);
  }
},100);
</script>
</body>
</html>
